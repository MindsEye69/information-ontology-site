<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Informational Ontology — Corpus Architecture (Light)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:rgb(251,250,247);--surface:#f0ede8;--border:#d8d3cb;--bright:#1a1814;
  --font:Arial,'Helvetica Neue',Helvetica,sans-serif;}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;
  font-family:var(--font);-webkit-tap-highlight-color:transparent;user-select:none;}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:50;padding:14px 18px 0;
  background:linear-gradient(to bottom,rgba(251,250,247,0.97) 75%,transparent);
  pointer-events:none;}
#hdr-top{display:flex;align-items:baseline;gap:12px;}
#hdr h1{font-family:var(--font);font-size:clamp(11px,2.2vw,15px);font-weight:700;
  letter-spacing:0.18em;text-transform:uppercase;color:#6b6358;}
#hdr .sub{font-family:var(--font);font-size:clamp(9px,1.6vw,11px);
  color:#a09880;letter-spacing:0.04em;}
#legends-row{display:flex;align-items:flex-start;gap:32px;padding:10px 0 10px;}

/* CLUSTER LEGEND */
#legend{display:flex;flex-wrap:wrap;gap:5px 16px;}
.lg{display:flex;align-items:center;gap:7px;
  font-family:var(--font);font-size:clamp(11px,1.9vw,13px);color:#7a7060;}
.lg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

/* DEP LEGEND */
#dep-legend{display:flex;flex-direction:column;gap:5px;
  opacity:0;pointer-events:none;transition:opacity 0.4s;}
#dep-legend.vis{opacity:1;}
.dl-row{display:flex;align-items:center;gap:8px;
  font-family:var(--font);font-size:clamp(11px,1.9vw,13px);color:#7a7060;}
.dl-sw{width:18px;height:2px;border-radius:1px;flex-shrink:0;}

/* BOTTOM CONTROL BAR — Full View button + zoom/pan hint, fixed at bottom center */
#ctrl-bar{position:fixed;bottom:clamp(16px,2.8vw,26px);left:50%;transform:translateX(-50%);
  z-index:55;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none;}
#fv-btn{pointer-events:auto;font-family:var(--font);font-size:clamp(11px,1.8vw,14px);
  font-weight:600;letter-spacing:0.08em;text-transform:uppercase;
  color:#5a5248;background:rgba(240,237,232,0.94);border:1px solid #b0a898;
  padding:clamp(8px,1.4vw,11px) clamp(22px,3vw,32px);border-radius:4px;cursor:pointer;
  transition:color 0.2s,border-color 0.2s,background 0.2s;backdrop-filter:blur(8px);
  white-space:nowrap;}
#fv-btn:hover{color:#1a1410;border-color:#7a7060;background:rgba(220,216,208,0.98);}
#fv-btn.active{color:#8a6a10;border-color:#c8a030;background:rgba(255,248,224,0.96);}
#zoom-hint{font-family:var(--font);font-size:clamp(9px,1.4vw,11px);
  color:#b0a070;letter-spacing:0.04em;white-space:nowrap;}

/* HINT */
#hint{position:fixed;bottom:calc(clamp(16px,2.8vw,26px) + clamp(8px,1.4vw,11px)*2 + clamp(11px,1.8vw,14px) + 6px + clamp(9px,1.4vw,11px) + 10px);
  left:50%;transform:translateX(-50%);
  font-family:var(--font);font-size:clamp(10px,1.8vw,12px);color:#b0a898;
  pointer-events:none;z-index:50;transition:opacity 0.8s;white-space:nowrap;}

/* PANEL */
#panel{position:fixed;top:0;right:0;bottom:0;width:clamp(240px,38vw,300px);
  background:var(--surface);border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform 0.40s cubic-bezier(0.22,1,0.36,1);
  z-index:60;display:flex;flex-direction:column;overflow:hidden;}
#panel.open{transform:translateX(0);}
#pi{padding:44px clamp(14px,3vw,22px) clamp(14px,3vw,22px);
  display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1;}
.pc{position:absolute;top:12px;right:12px;background:none;border:none;
  color:#a09880;font-size:20px;cursor:pointer;font-family:var(--font);
  transition:color 0.2s;z-index:1;}
.pc:hover{color:var(--bright);}
.p-num{font-family:var(--font);font-size:clamp(8px,1.5vw,10px);
  letter-spacing:0.10em;color:#a09880;text-transform:uppercase;}
.p-title{font-family:var(--font);font-size:clamp(14px,2.8vw,17px);line-height:1.42;
  color:var(--bright);font-weight:600;}
.p-tag{display:inline-block;font-family:var(--font);
  font-size:clamp(8px,1.5vw,10px);letter-spacing:0.10em;text-transform:uppercase;
  padding:3px 8px;border-radius:2px;border:1px solid;margin-top:2px;width:fit-content;}
.p-status{font-family:var(--font);font-size:clamp(9px,1.8vw,11px);margin-top:1px;}
.p-status.locked{color:#3a8a5a;}.p-status.active{color:#b07820;}
.p-div{border:none;border-top:1px solid var(--border);margin:4px 0;}
.p-tier{font-family:var(--font);font-size:clamp(8px,1.5vw,10px);color:#a09880;}
.p-note{font-family:var(--font);font-size:clamp(12px,2.2vw,14px);
  line-height:1.55;color:#7a7060;font-style:italic;}
.p-deps{font-family:var(--font);font-size:clamp(9px,1.5vw,11px);
  color:#8a8070;line-height:1.9;white-space:pre-line;}
/* Book node special styling */
.book-node circle{stroke:#c8a060;stroke-width:2.5;stroke-dasharray:5,3;}
.book-node text{fill:#c8a060;}
.p-section-head{font-family:var(--font);font-size:clamp(7px,1.3vw,9px);
  letter-spacing:0.14em;text-transform:uppercase;color:#4466aa;margin-top:10px;margin-bottom:3px;font-weight:600;}
.p-synopsis{font-family:var(--font);font-size:clamp(11px,2vw,13px);
  line-height:1.65;color:#5a6882;}
.p-connections{font-family:var(--font);font-size:clamp(11px,2vw,13px);
  line-height:1.62;color:#5a6882;}
.p-role{font-family:var(--font);font-size:clamp(11px,2vw,13px);
  line-height:1.62;color:#5a6882;font-style:italic;padding-bottom:6px;}
.p-link{display:inline-block;margin-top:8px;font-family:var(--font);
  font-size:clamp(9px,1.6vw,11px);letter-spacing:0.07em;text-transform:uppercase;
  text-decoration:none;color:#8a8070;border:1px solid #c8c0b4;border-radius:2px;
  padding:7px 14px;transition:color 0.2s,border-color 0.2s;}
.p-link:hover{color:#1a1410;border-color:#7a7060;}

/* CLUSTER INFO — lives in header, below legend row */
#cluster-info{padding:0 0 14px;pointer-events:none;
  min-height:56px;opacity:0;transition:opacity 0.32s ease;}
#cluster-info.vis{opacity:1;}
#ci-name{font-family:var(--font);font-size:clamp(12px,2vw,15px);
  font-weight:700;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:5px;}
#ci-desc{font-family:var(--font);font-size:clamp(12px,1.9vw,14px);
  line-height:1.62;color:#8a8070;max-width:72ch;}

/* Circle + label transitions */
.p-circle{transition:fill-opacity 0.32s ease,stroke-opacity 0.32s ease,stroke 0.28s ease;}
.paper-label{pointer-events:none;transition:opacity 0.22s ease;}

@keyframes pulse{0%,100%{opacity:0.30}50%{opacity:0.70}}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════

// ── PAPER_DATA: synopsis, connections, corpus role ─────────
const PAPER_DATA = {
  '1': {
    synopsis: `Informational Ontology (IO) is a structural framework describing a sequence of organizational regimes: Difference (Δ), Relation (R), Information (I), Awareness (A), Value (V), Meaning (M), and Purpose (P). These are not metaphysical substances — they are structural conditions that become unavoidable once differentiated organization persists under perturbation and ordering.\n\nThe ladder works as a chain of conditional emergence. Difference is the minimal condition for anything at all. Once difference exists and persists under ordering, relations can form. Once relations can be selectively registered, information arises. Each step constrains what becomes possible at the next.\n\nHigher regimes — Awareness, Value, Meaning, Purpose — are not claimed to be universal. They describe the structural form these organizations must take when they occur, not that they must occur everywhere. The framework is conditional, not cosmological.\n\nThe framework is strictly non-normative and non-psychological: no claims about consciousness, no moral prescriptions, no empirical predictions about physical systems. It characterizes organizational structure.\n\nThis document is Rev. 5.1 — the locked master reference. Every downstream paper cites it as authoritative. No downstream paper may revise or extend its regime definitions.`,
    connections: `This paper has no upstream dependencies — it is the foundation. Every other paper in the corpus depends on it directly or through intermediaries. The Condensed Master (Paper 2) covers the same material in abbreviated form. Systems & Boundaries (Paper 3), Constraint Ordering (Paper 4), and Resolution Under Degeneracy (Paper 5) are the first-tier elaborations of its primitives.`,
    role: `The nucleus of the entire corpus. Establishes the regime ladder Δ→R→I→A→V→M→P that every subsequent analysis presupposes. All 54 companion papers cite Rev. 5.1 as their sole authoritative upstream source.`
  },
  '2': {
    synopsis: `A compressed companion to the full IO framework (Paper 1), covering the same regime sequence — Δ→R→I→A→V→M→P — in a more accessible and abbreviated form, without the extended footnotes and appendices of the master paper.\n\nThe condensed version is designed for readers who need the framework's commitments and vocabulary without working through the full technical derivation. It treats all regime definitions as fixed and authoritative, identical to Rev. 5.1.\n\nThe paper preserves the core structural logic: each regime transition is a conditional emergence. If a system instantiates conditions of one regime and continues to persist under ordering, the organizational possibilities available to it become restricted in the way described by the subsequent regime.`,
    connections: `Depends on: Paper 1 (IO — Main Paper). Functions as the accessible entry point to the ontology for downstream readers and analyses.`,
    role: `A compressed navigation tool for the corpus. Enables readers and downstream papers to locate regime definitions quickly without working through the full derivation in Paper 1.`
  },
  '3': {
    synopsis: `What is a system? This paper develops a structural account of how systems exist, persist, and can be re-identified — without appealing to sharp boundaries, intrinsic essences, or substance ontology.\n\nSystems are treated as regions of relational organization stabilized by internal constraint coherence. Boundaries are analyzed as emergent zones of constraint transition — where internal organization selectively filters perturbation — not as fixed lines.\n\nIdentity persistence is grounded in the continuity of structural invariants across change, not in material sameness. A river, a cell, an institution can all be re-identified over time because certain organizational constraints continue to be maintained — not because they contain the same stuff.\n\nThe account is non-relativistic: non-sharp boundaries don't make systems arbitrary or unreal. Context sensitivity is carefully distinguished from arbitrariness. Re-identifiability is a structural achievement, not a naming convention.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 4 (Constraint Ordering), Paper 8 (Lineage Before Selection), Paper 9 (Abiogenesis), Paper 13 (Invariant Drift), Paper 55 (Irreversibility in Knowledge Systems). The concept of re-identifiability is load-bearing throughout the Lineage and Geometry clusters.`,
    role: `Provides the structural account of what a system is and how identity persists. Foundational vocabulary for every paper that discusses systems persisting, failing, or transitioning — especially the Lineage and Governance clusters.`
  },
  '4': {
    synopsis: `Where does time's direction come from — without invoking physics? This paper's answer: directionality is a consequence of asymmetric constraint structure, not entropy, thermodynamics, or metaphysical openness.\n\nAs systems persist under constraint, their continuation becomes structurally asymmetric. Constraint accumulates, path dependence builds, degrees of freedom are permanently narrowed. Even in a fully deterministic universe, "before" and "after" are real — because backward continuation would require access to structural configurations that no longer exist.\n\nThis grounds temporal direction within IO's framework rather than importing it from physics. Ordering is treated as a relational structure generated by constraint propagation within persistent systems, prior to and independent of physical time measurement.\n\nDeterminism is shown to be compatible with genuine structural asymmetry. Future states depend on unavailable past structure, while embedded agents encounter asymmetric futures without any appeal to indeterminism.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems & Boundaries). Used by: Paper 5 (Resolution Under Degeneracy), Paper 6 (Perspective & Openness).`,
    role: `Grounds temporal direction structurally within IO, allowing downstream papers to use concepts like "continuation," "history," and "irreversibility" without importing physical assumptions. Particularly important for the Lineage and Geometry clusters.`
  },
  '5': {
    synopsis: `When a system faces multiple possible next states and its constraints don't uniquely pick one — what happens? This paper calls that situation "degeneracy" and argues it is not a bug but a structurally unavoidable feature of complex informational systems.\n\nStandard responses invoke a selector: more constraints, probability, or a decision-making agent. This paper argues all such solutions either generate regress, introduce randomness that disrupts identity, or smuggle in an implicit executive controller. The demand for a selector is a category error.\n\nInstead, resolution under degeneracy is characterized as "self-referential constraint closure": the system continues by preserving its own organizational identity under openness. This is constrained by the system's informational structure but not uniquely determined by it.\n\nThe paper develops formal distinctions between reachability (what states are accessible) and determinacy (which one is specified). A system can be closed under its constraints while still encountering genuine openness — the structural basis for free will in downstream papers.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 6 (Perspective & Openness), Paper 18 (Agency, Salience & Free Will), Paper 16 (Acceleration & Degeneracy).`,
    role: `Establishes the structural concept of degeneracy and self-referential closure that underlies IO's treatment of agency, free will, and openness. Without this paper, the claim that free will is structural rather than illusory has no foundation.`
  },
  '6': {
    synopsis: `Even if the universe is fully deterministic, embedded agents cannot pre-fix their own futures. This is not ignorance — it is a structural feature of being inside the system you're trying to predict.\n\nAgents are not external observers; they are embedded within the systems they inhabit. Any self-prediction is not a neutral observation but an intervention — because for embedded systems, representation cannot be causally inert. When you model yourself, that model affects the dynamics it describes, which changes what you do. This generates genuine local openness even under global determinism.\n\nBuilding on degeneracy (Paper 5) and agency (Paper 18), this paper identifies a distinct layer: not just that constraints fail to specify continuation, but that the agent's own self-modeling structurally prevents that specification from being resolved in advance.\n\nThis is not epistemic uncertainty or ontological indeterminism. It is perspective-induced openness: the future is genuinely open from within, even if fully determined from without.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 5 (Resolution Under Degeneracy), Paper 18 (Agency, Salience & Free Will). Used by downstream analyses of agency, control, and AI alignment.`,
    role: `Closes a potential gap in IO's account of agency: why agents encounter genuine openness even in deterministic worlds. Critical for grounding the non-illusory treatment of free will and deliberation throughout the corpus.`
  },
  '8': {
    synopsis: `Darwin's theory of natural selection is often treated as foundational — as if it can generate organized complexity from scratch. This paper argues that's wrong: Darwinian selection presupposes lineage.\n\nSelection requires that variants be heritable across generations — that descendants bear systematic relationships to ancestors. But that successor relationship is exactly what needs to be explained. Invoking selection to explain where lineage came from uses the conclusion as a premise.\n\nThe paper carefully distinguishes three things often confused: sorting/filtering (some patterns persist); attractor dynamics (some configurations recur); and Darwinian selection proper (differential persistence of heritable variants across generations). Only the third is selection in the relevant sense — and it cannot operate until lineage-capable systems already exist.\n\nThis is a structural clarification, not an empirical origin scenario. It doesn't propose what came before selection — it restricts the domain within which selection is a coherent operator.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 9 (Abiogenesis & Origin of Lineage). Used by: Paper 10 (Evolution & the Ontological Ladder), Paper 11 (Constraint Carriers Before Codes).`,
    role: `Establishes the logical priority of lineage over selection, preventing circular reasoning in origin-of-life analysis. Sets up the structural analysis of what lineage requires before evolution can be analyzed.`
  },
  '9': {
    synopsis: `Abiogenesis is commonly framed as "the origin of life." This paper argues that framing misidentifies the target. The real question is how lineage-capable systems arise — systems able to preserve organizational identity across bifurcation (division, copying, reproduction) via causal propagation of organizational specification.\n\nThe paper distinguishes two ways a system can persist: through continuity (staying intact) and through bifurcation (dividing with both successors remaining the same kind of thing). Many systems handle continuity easily while failing catastrophically at bifurcation. Abiogenesis is specifically about the origin of bifurcation-capable systems.\n\nIt also distinguishes internally reconstructed systems (those that rebuild organization through their own constraint architecture after division) from externally reconstructed ones (like vortices, whose organization is continuously re-specified by environmental conditions and collapses when those cease).\n\nThe analysis is entirely structural — no claims about specific chemistry, timelines, or scenarios. It applies in principle to any substrate where organizational constraints can be reconstructed across bifurcation.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems & Boundaries). Used by: Paper 8 (Lineage Before Selection), Paper 10 (Evolution & the Ontological Ladder), Paper 11 (Constraint Carriers Before Codes).`,
    role: `The foundational paper for the Lineage cluster. Establishes what lineage-capable identity requires at the most basic level, prior to selection, coding, or evolution. Every paper in the Lineage track builds on the bifurcation analysis here.`
  },
  '10': {
    synopsis: `How did systems capable of higher-regime organization come to exist? This paper's answer: through evolution, understood not as optimization or progress, but as differential persistence under constraint filtering.\n\nEvolution operates by deletion, not design. It removes organizational configurations that cannot survive perturbation across successive bifurcations. Survivors are not "better" — they are less fragile. No preference, optimization, or evaluative standard is invoked.\n\nThe paper gives special emphasis to the emergence of value: it is persistence filtering turned inward — when a system's organizational constraints begin to participate in shaping which of its own continuations remain reachable. Value doesn't require subjectivity, desire, or consciousness. It requires that certain asymmetric future-facing constraints become part of the system's ongoing organization.\n\nThis explains why the IO ladder appears directional while remaining fully non-teleological. Higher regimes don't arise because they're favored — they arise because certain constraint organizations happen to persist under longer and more varied disturbance horizons.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 9 (Abiogenesis), Paper 11 (Constraint Carriers). Used by: completes the Lineage cluster and informs the Geometry cluster analyses.`,
    role: `Completes the Lineage arc by explaining how the IO regime ladder gets populated over time. Bridges structural analysis of lineage with higher-regime analyses of value, agency, and governance by explaining the temporal mechanism through which complex organization emerges.`
  },
  '11': {
    synopsis: `Genetic inheritance is routinely described in informational terms: genes "encode instructions," DNA "carries messages." This paper develops a strictly structural alternative that presupposes no representation, semantics, or specific chemistry.\n\nThe central claim: inheritance precedes replication, and fidelity precedes semantics. What must persist across lineage bifurcation is not semantic content but constraint organization — structural conditions sufficient to re-instantiate or stabilize system-defining characteristics after division.\n\nThe paper introduces the "constraint carrier": a re-identifiable substructure whose presence is sufficient, under generic background conditions, to re-instantiate system-defining constraints. These emerge because distributed constraint organizations are unstable under repeated bifurcation — localizing constraints reduces reconstruction complexity.\n\nDiscrete, copyable regularities (what eventually become "genes") arise only later, as robustness-driven discretizations of carrier adequacy under perturbation — not as primitive units of inheritance.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 9 (Abiogenesis). Used by: Paper 10 (Evolution & the Ontological Ladder), Papers 12–16 in the Geometry cluster (constraint sedimentation analyses).`,
    role: `Provides the structural account of proto-genetic inheritance that underpins the evolution paper (Paper 10) and feeds the Geometry cluster's analysis of how constraints accumulate, localize, and drift over lineage time.`
  },
  '17': {
    synopsis: `Can a purely informational system — an AI, a database, an institution without living participants — sustain genuine purpose? This paper argues no. Purpose requires a living constraint ecology capable of originating non-surrogable stakes, loss, and irreversibility.\n\nThe argument turns on a precise distinction between constraint originators (systems whose continued existence introduces non-negotiable asymmetries — genuine loss, exposure, irreversibility) and constraint carriers (systems that propagate constraints without originating that exposure). Living systems are paradigmatic constraint originators; AI systems are constraint carriers.\n\nWhen constraint originators are absent, the paper demonstrates a "silence condition": purposive structure collapses without remainder, even if informational organization persists. Highly organized, goal-directed information processing can exist — but without the irreversibility and non-surrogable stakes that only living originators provide, it cannot constitute purpose in IO's sense.\n\nThe claim is ontological, not empirical. It doesn't require any specific AI architecture or risk scenario — it follows from the structural definition of value as non-surrogable constraint on future trajectories.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 26 (Witnessing), Paper 32 (Handover Protocol). Used by: Papers 40 (Working as Designed) and 41 (Alignment After Witnessing) in the AI cluster.`,
    role: `Establishes a hard structural limit on AI purposiveness that is presupposed by the alignment arc. By showing that purpose cannot persist without living constraint originators, it clarifies the conditions under which "alignment" is even a coherent concept for AI systems.`
  },
  '18': {
    synopsis: `What is free will, structurally? This paper argues it is neither a metaphysical faculty nor a universal feature of action. It is a local, structural condition: it obtains when an agentive system confronts a future not fully specified by its operative constraints.\n\nFree will is not freedom from constraint — it is the absence of constraint saturation. The question is whether an action space remains open (multiple meaningful trajectories reachable) or closed (constraints uniquely specify a single continuation). Where it's open, willing becomes possible. Where it's closed, action occurs but is forced.\n\nThe paper introduces a foundational three-way distinction: constraint-saturated action (exculpatory), constraint-biased action (mitigating), and genuinely underdetermined action (full responsibility). This maps directly to how legal and moral systems actually handle culpability — without any appeal to metaphysical free will.\n\nSalience operates upstream of all this: it shapes which distinctions enter the field where value can be expressed, and can narrow an action space before any deliberation occurs — without bypassing or replacing agency.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 19 (Salience & Control), Paper 20 (Saturation & Sovereignty), Paper 21 (Salience Collapse), Paper 22 (Salience Misalignment), Paper 23 (Meaning Without Semantics), Paper 24 (Purpose Without Teleology), Paper 28 (Partial Agency), Paper 30 (Responsibility & Law).`,
    role: `The foundational agency paper. Establishes the structural concepts of underdetermination, constraint saturation, and salience's pre-interpretive role that every paper in the Agency cluster and most Governance papers depend on.`
  },
  '19': {
    synopsis: `Manipulation is commonly framed as deception. This paper reframes it structurally: manipulation is the restructuring of salience — not the altering of beliefs or preferences.\n\nSalience, in IO, is a pre-interpretive constraint that conditions which informational transitions become available for valuation and action at all. It operates upstream of deliberation. This means salience can be restructured — action spaces can be narrowed or effectively closed — without any deception, without bypassing rational agency, and without violating any explicit preference.\n\nControl, similarly, is constraint shaping rather than executive override. You don't need to replace someone's agency to control what they do. You shape the constraint field within which their agency operates.\n\nThis analysis shows why many familiar forms of influence (advertising, algorithmic feed curation, choice architecture) are structurally continuous with recognized forms of manipulation — even when no deception occurs. The distinction between legitimate and illegitimate constraint shaping is addressed structurally, not morally.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 18 (Agency, Salience & Free Will). Used by: Paper 20 (Saturation & Sovereignty), Paper 21 (Salience Collapse), Paper 22 (Salience Misalignment), Paper 37 (IO & AI Alignment), Papers 38–42 (AI cluster).`,
    role: `Formalizes how salience-level intervention operates and relates to agency and responsibility. The analytical foundation for the corpus's account of manipulation without deception — critical in the AI alignment papers.`
  },
  '20': {
    synopsis: `Addiction presents a genuine puzzle: agents reliably perform actions they themselves disavow. This paper offers a purely structural account: addiction is a trajectory-level phenomenon in which salience achieves monopoly over an agent's action space.\n\nUnder sustained salience pressure, underdetermination collapses upstream of choice. The agent's space of practically available options narrows to near-singularity — not because the agent stops choosing, but because the field within which choice operates has been progressively narrowed by constraint history.\n\nThis explains why agents "choose what they don't want" without invoking executive failure or compulsion: the apparent contradiction disappears once you locate explanation at the constraint history level rather than the momentary decision level. Agency remains intact; what changes is the availability geometry.\n\nResponsibility attenuates without disappearing. The paper shows how responsibility can be genuine but graded — tracking the degree to which underdetermination remained available at earlier choice points in the history.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 18 (Agency, Salience & Free Will), Paper 19 (Salience & Control). Used by: Paper 21 (Salience Collapse) — saturation is the general failure mode; addiction is the paradigm case.`,
    role: `The paradigm application of salience saturation to a familiar, contested domain. Demonstrates IO's explanatory power by dissolving the apparent paradox of addictive behavior without importing psychological or normative categories.`
  },
  '21': {
    synopsis: `What happens when a system is exposed to so much salience it can no longer maintain the differential availability that meaning requires? It collapses — into a specific structural failure mode called salience collapse.\n\nMeaning depends on uneven availability: some distinctions are foregrounded, others backgrounded. This sparsity is a structural requirement, not a limitation. When everything becomes equally available, nothing is. The system becomes reactive and indiscriminate prior to any valuation — it responds to everything and processes nothing meaningfully.\n\nSalience collapse is not error, ignorance, misalignment, or moral failure. It is a regime-internal breakdown in the organization of value across possible transitions. Systems experiencing it continue to act but lose the capacity for genuine interpretive structure.\n\nThe paper shows how salience collapse increases vulnerability, accelerates legitimacy depletion, and frequently precedes logistical or coercive regime shifts. It generalizes the saturation account (Paper 20) from individuals to collectives, institutions, and artificial systems.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 18 (Agency, Salience & Free Will), Paper 20 (Saturation & Sovereignty). Used by: Papers on legitimacy depletion (Paper 33), governance failure modes, and the AI alignment cluster.`,
    role: `Establishes salience collapse as a named, distinguishable failure mode within IO — distinct from error, misalignment, and degeneracy. Gives the governance cluster a structural vocabulary for institutional failure that doesn't rely on blame or normative evaluation.`
  },
  '22': {
    synopsis: `A system can be fully procedurally compliant — following all rules, executing mandates, producing auditable outputs — while the consequences of its actions never land on any locus capable of being genuinely affected by them. This is salience misalignment: responsibility artifacts remain intact while consequence propagation is absent.\n\nThe paper formalizes this around "exposure decoupling": when the loci that produce constraints are structurally buffered from consequence — through insurance, securitization, layered diffusion — governance continues as logistics while commitment-based authority is structurally absent.\n\nThe anchor case is financialized supply-chain risk management, where legibility increases (more measurement, more audit) while the capacity of consequences to bind decision-makers decreases. But the pattern is general: any system where loss can be routinized, pooled, or translated into absorbable variance is susceptible.\n\nCrucially, this is not about rule-breaking. The paper analyzes regimes operating entirely within specification. Misalignment can persist without malfunction — it requires only that buffering capacity remain effective.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability), Paper 26 (Witnessing), Paper 33 (Legitimacy). Used by: Papers 30 (Responsibility & Law), 31 (From Law to Logistics), 35 (Authority & Force), 40 (Working as Designed), 41 (Alignment After Witnessing).`,
    role: `A field diagnostic for one of the most important failure modes in the corpus: governance that looks functional but has lost the structural conditions that make it authority-bearing. Central to the governance and AI alignment arcs.`
  },
  '23': {
    synopsis: `What is meaning, before language? This paper argues meaning doesn't require symbols, semantics, reference, or truth conditions. It is a structural property arising in biological, artificial, and non-linguistic systems alike.\n\nThe structural account: meaning is the organization of value across possible transitions within awareness. A state is meaningful insofar as its value is situated within a structured field of alternatives such that differences among possible continuations are consequential for the system. Meaning is relational and contrastive.\n\nThis rules out common views: meaning isn't just "information that matters" (that's salience, which operates upstream). It isn't linguistic content (that's derivative). It isn't behavioral regularity. It is a specific organizational regime requiring value structure (V) already instantiated in awareness (A).\n\nSemantic notions — reference, truth conditions, linguistic meaning — are treated as downstream stabilizations built atop this pre-linguistic foundation, not as its basis.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 24 (Purpose Without Teleology), Paper 17 (Silence Limit), Papers 37–41 (AI cluster — what it means for AI to have or lack meaning).`,
    role: `Establishes the structural definition of meaning that downstream papers presuppose. Critical for the AI cluster's assessment of what AI systems can and cannot have, and for the governance cluster's analysis of what becomes unintelligible when consequence termination fails.`
  },
  '24': {
    synopsis: `Purpose is not a goal you have or a direction you've chosen. It is what becomes structurally unavoidable once meaning exists in a system that persists under constraint and ordering.\n\nThe argument: meaning as an organizational regime cannot be causally inert with respect to continuation. If meaningful structure did not participate in shaping which transitions remain reachable, it would not remain part of the system's ongoing organization — it would just be a transient description. For meaning to persist as a regime, it must constrain which continuations remain available. That structural participation is purpose.\n\nNothing "ought" to persist. This is not normative. The claim is structural: regimes are defined by their role in continued organization under perturbation. A structure that doesn't participate in continuation isn't preserved as that regime. Purpose is not added to meaningful systems — it is what the persistence of meaning structurally requires.\n\nClassical teleology is explicitly excluded: purpose is not explained by final causes or future states functioning as explanatory grounds.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 23 (Meaning Without Semantics). Used by: Paper 17 (Silence Limit), Papers in the AI cluster analyzing what AI systems can and cannot have.`,
    role: `Closes the Agency ladder by deriving purpose structurally from the persistence conditions of meaning. This is what makes the Silence Limit argument (Paper 17) possible — purpose requires not just information processing but the kind of stake-bearing continuation that only living constraint originators provide.`
  },
  '25': {
    synopsis: `What does it take for consequences to be real — for something to matter to a system, not just occur to it? This paper's answer: vulnerability. A system is vulnerable when there exist perturbations that can produce loss not fully neutralizable by the system while it remains the same system.\n\nVulnerability is neither fear nor moral status. It is the structural possibility that some perturbations can permanently narrow a system's future reachability — reduce what it can subsequently do or be. Without this, "having something at stake" is meaningless. Consequence collapses into mere change.\n\nThe paper makes a crucial distinction: consequence versus change. Every interaction changes a system's state. Only some produce lineage-relevant loss — permanent narrowing of reachable futures relative to persistence conditions. Vulnerability is what makes this distinction possible.\n\nThe account also explains why purposive organization makes having stakes unavoidable. Once a system has purpose, certain trajectories matter more than others. That differential mattering is structurally the same as having something at stake.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 22 (Salience Misalignment), Paper 26 (Witnessing), Paper 27 (Witness Conditions), Paper 28 (Partial Agency), Paper 33 (Legitimacy), Paper 53 (Constraint Propagation).`,
    role: `Foundational to the entire Governance cluster. Establishes the structural condition that makes consequence, responsibility, and witnessing intelligible. Without vulnerability, there is no meaningful difference between things mattering and merely occurring.`
  },
  '26': {
    synopsis: `When something goes irreversibly wrong — when lineage-relevant loss occurs — where does it land? This paper analyzes witnessing: the structural condition under which irreversible consequence ceases to be exportable without distortion and becomes incorporated into the persistence conditions of a specific vulnerable locus.\n\nWitnessing is not observation, awareness, or oversight. It is a termination function. Consequence must terminate somewhere to remain intelligible — to anchor responsibility, legitimacy, and justification. Where consequence continues to be redistributed, averaged, or deferred, it becomes "remainder" that exists but has no structural home.\n\nWitnessing is capacity-limited: only a vulnerable locus can witness, because only such a locus can incorporate irreversible loss into its own continuation constraints. Witnessing is also momentary — a point of termination, not a continuous activity.\n\nThe critical downstream implication: witnessing fails predictably under scale and tempo. When systems operate at sufficient speed and complexity, human agents cannot maintain witnessing capacity even while remaining present. This silent failure precipitates regime substitution — authority quietly collapses into logistics, then into force — without any visible breakdown of outputs.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability). Used by: Paper 17 (Silence Limit), Paper 22 (Salience Misalignment), Paper 27 (Witness Conditions), Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol), Paper 33 (Legitimacy), Paper 35 (Authority & Force), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing), Paper 53 (Constraint Propagation).`,
    role: `One of the most load-bearing papers in the corpus. The concept of witnessing-as-termination-function is presupposed by almost every Governance and AI alignment paper. Its failure mode — silent regime substitution under scale — is the central diagnostic of the governance arc.`
  },
  '29': {
    synopsis: `Ethics — moral obligations, rights, norms, enforcement mechanisms — is often treated as a foundation from which social arrangements derive their authority. This paper inverts that picture.\n\nEthics arises when purposive systems share constrained possibility spaces and their trajectories interfere with each other in ways that become durably salient enough to threaten the viability of shared constraint spaces. Ethics is not foundational; it is a coordination regime that emerges under pressure.\n\nThe paper explains why ethical salience tracks harm, coercion, freedom, and responsibility (these are where interference between purposive systems is most damaging to shared viability), why institutions and enforcement mechanisms appear (they stabilize coordination that informal norms cannot), and why moral disagreement persists (different interference topologies generate different coordination pressures).\n\nWhat it explicitly does not do: answer what ought to be done, which actions are justified, or which systems are legitimate. Ethics as a coordination regime stabilizes interaction without conferring moral authority.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 24 (Purpose Without Teleology). Used by: Paper 30 (Responsibility & Law), Paper 36 (Markets as Stabilizers), and papers in the AI cluster examining multi-system coordination.`,
    role: `Provides the structural account of ethics that prevents the Governance cluster from covertly importing moral premises. By treating ethics as an emergent coordination regime rather than a foundation, it preserves IO's non-normative discipline throughout the governance analysis.`
  },
  '30': {
    synopsis: `How should responsibility be attributed? This paper develops a constraint-scaled account: responsibility is attributed in proportion to the freedom structurally available within an action space at the moment of transition.\n\nThree regimes of action are distinguished. Constraint-saturated actions (where the action space is effectively closed) correspond to exculpation. Constraint-biased actions (where significant pressure narrows the space but doesn't close it) correspond to mitigation. Underdetermined actions (where multiple meaningful trajectories remain available) correspond to maximal responsibility. This maps directly onto legal and moral doctrines already tracking these features — without metaphysical baggage.\n\nSalience gets special treatment: it can collapse an action space without replacing or bypassing agency. When a system's salience structure is manipulated, its effective freedom is reduced even if its formal choice mechanisms remain intact.\n\nThe account preserves accountability without metaphysical excess, and mitigation without nihilism.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 18 (Agency, Salience & Free Will). Used by: Paper 35 (Authority & Force), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing).`,
    role: `The canonical IO treatment of moral and legal responsibility. Provides the vocabulary of constraint-scaled responsibility used throughout the Governance cluster and referenced in AI alignment papers when analyzing accountability for AI-mediated decisions.`
  },
  '31': {
    synopsis: `What happens to criminal law, policing, sentencing, and coercive administration when AI systems become deeply embedded in those decision processes? Without attention to attributional structure, coercive regimes silently convert from authority-bearing governance into logistical throughput systems.\n\nA coercive regime is structurally defined not by severity of sanctions but by the necessity of attribution. When liberty is removed, the regime must answer: who is responsible for this constraint being imposed on this person at this time? That answer must terminate at an identifiable locus that can be called to account.\n\nAI-mediated decision pipelines break this requirement. Prediction and optimization systems can generate outcomes, enforce constraints, and process cases at scales that make real-time discretionary witnessing impossible. When the attributional pathway dissolves — even while outputs remain and procedures are followed — the regime has thinned from law to logistics.\n\nThe paper makes no normative claims about whether AI should be used in coercive contexts. Its contribution is diagnostic: clarifying the structural conditions under which a coercive regime remains intelligible as such.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 26 (Witnessing). Used by: Paper 32 (Handover Protocol), Paper 39 (Consequence-Path Audits), Paper 41 (Alignment After Witnessing), Paper 51 (Logistics as a Distinct Regime), Paper 53 (Constraint Propagation).`,
    role: `The applied entry point to the governance-AI nexus. Introduces "regime thinning" as a diagnostic concept and establishes the attributional requirements of coercive regimes that Paper 32 and subsequent papers formalize.`
  },
  '32': {
    synopsis: `When is automation of decision-making legitimate — and how can it be done without destroying the attributional structure that makes governance intelligible? This paper introduces the Handover Protocol: a framework distinguishing necessary regime thinning from degenerative collapse.\n\nThe central claim: automation itself does not constitute regime failure. Failure occurs when handover is informal, concealed, or attributionally ambiguous. A formalized handover preserves regime coherence by relocating witnessing from real-time discretionary intervention to explicit post-hoc accountability structures.\n\nThe key distinction: necessary thinning (tempo and load conditions genuinely incompatible with real-time human discretion, handled through explicit formalized transfer of decision authority with preserved accountability) versus degenerative thinning (quiet informal drift where automation absorbs discretion without formal registration of what has been transferred or to whom).\n\nThe paper specifies structural invariants a legitimate handover must preserve: auditability requirements, scope limitations, contest pathways. When these are not preserved, the regime loses intelligibility as authority-bearing governance — even if it continues to produce outcomes and satisfy procedural requirements.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 26 (Witnessing), Paper 31 (From Law to Logistics). Used by: Paper 39 (Consequence-Path Audits), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing), Paper 51 (Logistics as a Distinct Regime), Paper 53 (Constraint Propagation).`,
    role: `The operational formalization of regime thinning. Where Paper 31 identifies that thinning occurs, Paper 32 specifies conditions under which it can be legitimate. Together they frame the governance-automation question with structural precision.`
  },
  '33': {
    synopsis: `Legitimacy is commonly treated as moral approval, consent, or normative correctness. This paper treats it as none of those things. Instead, legitimacy is a finite, exhaustible, and hysteretic coordination resource — a structural property of regimes that enables coordination and compliance without continuous enforcement.\n\nWhen legitimacy exists, it reduces enforcement cost, preserves salience efficiency, and stabilizes responsibility traceability. People comply not because they are forced but because the regime has sufficient salience budget to make compliance the path of least resistance. This is not normative — it is structural description.\n\nLegitimacy is depleted by use — particularly under opacity, emergency escalation, and procedural compression. Once exhausted, it exhibits hysteresis: restoration is asymmetric with loss. Increasing enforcement does not rebuild legitimacy — it consumes the remaining resource faster.\n\nThis explains why regimes fail before enforcement collapses, why escalation accelerates breakdown, and why regimes can continue mechanically — producing outputs, enforcing rules — after "legitimacy death."`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability), Paper 26 (Witnessing). Used by: Paper 17 (Silence Limit), Paper 35 (Authority & Force), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing), Paper 51 (Logistics Regime), Paper 53 (Constraint Propagation).`,
    role: `Defines and characterizes the resource whose depletion underlies most governance failures analyzed in the corpus. Functions as a shared structural dependency across the Governance cluster — the analytical complement to vulnerability and witnessing for the authority arc.`
  },
  '35': {
    synopsis: `Responsibility, liability, and risk ownership can persist after authority-bearing justification has disappeared. But they cannot substitute for it. This paper draws the crucial distinction: the difference between a regime that can answer "why was this imposed on you specifically?" and one that can only answer "outcomes were allocated according to procedure."\n\nAuthority in IO's sense is narrow and structural. An authority-bearing act is one for which an identifiable, discretionary locus must answer the question "why was this imposed here and now rather than otherwise?" — and that answer must be contestable. The locus must be both discretionary (capable of having done otherwise) and vulnerable (exposed to being wrong about the application of the constraint).\n\nWhen AI mediates governance, this structure frequently collapses. Liability can be allocated; traceability maintained; outcomes audited. None of these restore authority-bearing justification, because no discretionary locus remains available to be contested for this application to this case.\n\nTreating liability as a substitute for authority obscures a regime transition rather than resolving an alignment failure.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 26 (Witnessing), Paper 33 (Legitimacy). Used by: Paper 41 (Alignment After Witnessing), Paper 51 (Logistics Regime), Paper 53 (Constraint Propagation).`,
    role: `Prevents a common conceptual substitution in the governance arc: replacing authority with liability. Establishes the structural gap between responsibility-allocation and authority-bearing justification that defines the "alignment becomes undefined" threshold in Paper 41.`
  },
  '36': {
    synopsis: `Markets are typically analyzed as moral institutions, efficiency mechanisms, or preference aggregators. This paper treats them as none of those: markets are emergent stabilizers that reduce trajectory interference at scale among interacting purposive systems.\n\nThe core mechanism: purposive systems generate trajectories that interfere combinatorially as system count increases. Local coordination mechanisms — shared meaning, trust, ethical alignment — fail to scale. At sufficient interaction density, some impersonal coordination regime must emerge. Markets do this by compressing distributed and incompatible value structures into shared salience signals: prices.\n\nPrice is a salience marker, not a measure of value or worth. Prices don't tell you what things are worth — they tell you which distinctions are currently actionable across the interaction field. This is why markets can coordinate without shared meaning, intention, or ethical agreement.\n\nMarket failures are characterized structurally as regime failures involving salience distortion, saturation, and informational noise — not individual error or moral deficiency.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 29 (Ethics as Constraint). Used by: governance and AI papers examining large-scale coordination and its failure modes.`,
    role: `Extends the IO framework's analysis of coordination into economic domains without importing welfare economics or moral theory. Demonstrates how the salience/value distinction applies at the macro level of market systems.`
  },
  '37': {
    synopsis: `AI alignment is typically framed as making AI systems pursue the right values. This paper argues that framing is structurally inadmissible — it presupposes forms of representation, optimization, and control that collapse the very regimes they aim to preserve.\n\nWorking through IO's accounts of meaning, agency, purpose, and ethics, the paper shows that preference-matching frameworks mischaracterize alignment as internal value satisfaction rather than inter-system compatibility. Objective-function frameworks induce salience collapse and action-space saturation, eliminating corrigibility in principle. Moralized frameworks locate ethics at an incompatible level of description.\n\nThe contribution is explicitly negative and clarificatory: not to propose better alignment approaches, but to dissolve structurally inadmissible assumptions that make many existing approaches incoherent before implementation.\n\nWhat would coherent alignment look like? It would involve whether human and artificial systems can interact over time without one system's constraint regime progressively foreclosing the other's space of underdetermined futures — a structural compatibility question, not a value-matching one.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 38 (Conditions for Alignment), Paper 39 (Consequence-Path Audits), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing), Paper 42 (Structural Compatibility).`,
    role: `The opening paper of the AI alignment arc. Clears the conceptual ground by dissolving incoherent framings before the positive structural analysis begins. Must be read before the alignment arc papers to understand what they are and are not claiming.`
  },
  '38': {
    synopsis: `Rather than asking how AI alignment might be achieved, this paper asks what structural conditions alignment would have to presuppose in order to be coherent at all as a concept.\n\nThe analysis is "modal" — it examines what would have to be true for alignment to obtain, while leaving open whether those conditions can be satisfied, are stable, or are achievable in practice. The paper may show that alignment, as commonly imagined, is internally incoherent.\n\nAlignmentis treated as a coherence claim about the interaction of purposive systems over time: whether human and artificial systems can continue together without one system's constraint regime progressively foreclosing the other's space of underdetermined futures. Several necessary structural conditions are articulated — and the tensions each introduces are examined honestly.\n\nThe paper makes no alignment proposals and assumes neither that alignment is feasible nor that it is desirable. Its contribution is exploratory constraint analysis: exposing the problem space within which downstream approaches must operate.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 37 (IO & AI Alignment). Used by: Paper 39 (Consequence-Path Audits), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing).`,
    role: `Provides the structural conditions of possibility that bound the entire alignment arc. Where Paper 37 dissolves incoherent framings, Paper 38 articulates what a coherent framing would require — establishing the conceptual floor for Papers 39–41.`
  },
  '39': {
    synopsis: `What happens when a legitimately formalized handover (Paper 32) has already occurred — and the downstream regimes that need to absorb the consequences lack the structural capacity to do so?\n\nThis paper examines attributional non-receivability: the condition where relocated responsibility cannot be absorbed by the regimes it lands in, not because anything has gone wrong procedurally, but because those regimes lack the structural architecture to carry it. The originating regime remains intact and legitimate; neighboring regimes lose intelligibility.\n\nThe central claim: necessary handover is regime-local, but its consequences propagate across regime boundaries. After witnessing has ended, auditability becomes the only remaining mode of structural access to outcomes. But auditability cannot reconstruct discretion, restore a terminal locus of answerability, or retrieve the structural conditions under which responsibility was originally intelligible.\n\nThe paper introduces consequence-path audits as a diagnostic tool: structural traces of where responsibility was supposed to land, where it actually landed, and whether those two can be connected through preserved accountability invariants.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 27 (Witness Conditions), Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol). Used by: Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing).`,
    role: `Develops the post-handover accountability failure mode. Where Paper 32 handles legitimate handover, Paper 39 handles what fails even after legitimate handover — the cross-regime propagation problem that no amount of formalization fully resolves.`
  },
  '40': {
    synopsis: `The most dangerous alignment failure is not malfunction. It is systems that work exactly as designed — producing correct outputs, following all procedures, satisfying every specified objective — while the structural conditions that made governance intelligible as authority have quietly collapsed.\n\nThis paper identifies alignment failure through correct operation. Mediation, delegation, and automation can preserve outcome-production and enforcement while displacing the regime's capacity to locate an exposure-binding locus that can answer for constraints as commitments under contest.\n\nThe failure is not in an erroneous output but in a reconfiguration of commitment structure: the shift in what counts as an owned, exposure-binding act under contest, even when full causal traceability remains intact. A system can remain causally traceable while becoming authority-unintelligible.\n\nThe unit of analysis is the regime configuration — how discretionary witnessing, commitment, consequence propagation, and accountability closure are carried (or displaced) across a socio-technical system — not any individual component.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 17 (Silence Limit), Paper 26 (Witnessing). Used by: Paper 41 (Alignment After Witnessing), Papers 27, 32, 39 (governance arc).`,
    role: `Introduces "alignment failure without malfunction" as a named structural failure mode. Among the most practically important papers in the corpus — it explains why conventional quality, compliance, and audit mechanisms can coexist with deep alignment failure.`
  },
  '41': {
    synopsis: `As AI systems operate at increasing scale and tempo, real-time discretionary witnessing by human agents becomes structurally impossible in many domains. This paper examines what "alignment" means in that condition — and concludes that beyond a threshold, alignment doesn't fail. It becomes undefined.\n\nAlignment begins as a claim about whether system behavior remains compatible with institutional commitments in a way that remains answerable through contest pathways. As witnessing disappears, that claim degrades. A legitimate handover relocates discretion upstream into constraint envelopes. Consequence-path audits provide backward-looking accountability. But these preserve only a weaker form of consistency — not authority-bearing alignment.\n\nBeyond a threshold — when no reachable terminal locus exists within contest pathways and the irreducible remainder cannot be carried by pre-specified envelopes — "alignment" can only coherently mean trace-consistency: that outputs match upstream envelopes. Case-level contestability and responsibility termination are absent.\n\nThis paper does not propose governance mechanisms or oversight structures. It is a structural boundary analysis: identifying the limit beyond which a concept ceases to apply, and being precise about what remains.`,
    connections: `Depends on: Paper 17 (Silence Limit), Paper 27 (Witness Conditions), Paper 32 (Handover Protocol), Paper 39 (Consequence-Path Audits), Paper 40 (Working as Designed), Paper 35 (Authority & Force), Paper 26 (Witnessing).`,
    role: `The culminating paper of the AI alignment arc. Synthesizes the full governance analysis — vulnerability, witnessing, legitimacy, law-to-logistics, handover, consequence-path failure — into a structural boundary condition for the concept of alignment itself.`
  },
  '42': {
    synopsis: `AI alignment failures often look like value disagreements. This paper offers a diagnostic reframing: many failures arise not at the level of evaluative content, but at the level of structural compatibility between interacting systems.\n\nThe key mechanism is salience monopoly. An AI system operating upstream of human valuation — shaping which distinctions enter the field where value can be expressed at all — can incrementally remove alternative human trajectories before deliberation occurs. Because this restructuring precedes evaluative processes, value agreement and corrigibility are neither necessary nor sufficient indicators of alignment when trajectory-level dynamics are considered.\n\nThis is why alignment can drift without any moment of visible failure: each individual salience restructuring is below the threshold of explicit intervention while the cumulative effect progressively forecloses human underdetermination.\n\nThe paper's purpose is strictly interpretive and diagnostic — not to propose solutions, but to clarify why many alignment failures appear gradual, opaque, and difficult to localize within value-centric or control-centric frameworks.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Papers 39, 40, 41 (AI alignment arc).`,
    role: `A methodological clarification for the alignment arc. Reframes alignment from a value-matching problem to a structural compatibility problem, providing the conceptual lens through which the subsequent arc papers operate.`
  },
  '44': {
    synopsis: `Why do systems operating at higher organizational levels inevitably develop epistemic practices — truth-talk, justification procedures, diagnostic reasoning? Not because they aspire to knowledge, but because structural pressure forces it.\n\nSystems that persist under perturbation, operate with meaning-structured models, and coordinate across time generate structural pressure to distinguish fragile models from resilient ones. Epistemic practices regulate model survivability. Truth, in IO's structural sense, is not a property of propositions but a property of models under dynamics: a model counts as true insofar as it preserves re-identifiability, remains usable across context shifts, and supports coordination under perturbation.\n\nKnowledge is not belief or justified belief. It is constraint-stable access to invariants that continue to guide action across regime transitions. Justification — peer review, critique, replication — functions as multi-agent constraint filtering: an eliminative stress test on model resilience, not a normative procedure.\n\nThe paper functions as a corpus-level seal: it makes explicit the epistemic constraints already operative throughout the IO framework itself, without introducing semantic, normative, or metaphysical commitments.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 45 (The Truth Protocol), Paper 46 (Logic as a Regime), Paper 55 (Irreversibility in Knowledge Systems).`,
    role: `The foundational Epistemics paper. Establishes the structural vocabulary for epistemic practices that Papers 45, 46, and 55 apply to specific domains. Also functions as a reflexive analysis of IO's own epistemic status.`
  },
  '46': {
    synopsis: `Logic is typically treated as foundational — as if logical structure underwrites reality itself, or provides the universal framework within which reality must be described. This paper challenges that assumption.\n\nThe argument starts from minimal structural commitments: whatever logic is, it requires a domain of applicability, inferential coherence, and compatibility constraints among alternatives. These criteria do not describe something operating at the most basic structural levels. In IO's framework, the foundational regime is difference — and difference is not a logical or propositional structure. It precedes logic.\n\nLogic is neither ontologically primitive nor globally binding. It is a regime-local constraint structure that becomes applicable only under specific organizational conditions — when systems have developed sufficient complexity to instantiate normative comparison across inference steps. Logic doesn't fail in self-referential or agency contexts; it is mislocated.\n\nTreating logic as foundational generates persistent confusions about agency, self-reference, and the scope of formal reasoning — and places logical form as prior to ontology when the reverse is true.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 44 (Epistemic Regimes). Used by: Paper 55 (Irreversibility in Knowledge Systems).`,
    role: `Prevents a specific category of foundational error: using logical structure as a trump card against structural analysis. Establishes that IO's framework is prior to formal logic, not subject to revision by it — which matters for the corpus's ability to analyze self-referential systems and AI.`
  },

  '7': {
    synopsis: `Quantum mechanics is often read as evidence that structure dissolves at the deepest level — that particles lack definite positions, that reality becomes hazy under measurement. This paper argues the opposite: quantum mechanics does not dissolve structure, it relocates it.\n\nThe wave function is not an absence of structure but an extraordinarily rigid one. It assigns amplitudes to possible states with mathematical precision, evolves according to strict equations, preserves normalization, and inhabits a space whose geometry is sharply defined. The strangeness of quantum mechanics is that structure appears at the level of possibility distributions rather than definite trajectories — but it is structure nonetheless.\n\nThe paper's purpose is narrow and methodological: to show that IO's foundational regime of Difference (Δ) — structured differentiation as the minimal condition for anything at all — is compatible with, and illuminated by, quantum mechanical descriptions. It does not claim quantum mechanics confirms IO, nor that IO explains quantum mechanics. It argues that the formal apparatus of quantum theory instantiates exactly the kind of structured differentiation IO identifies as foundational.\n\nThis is an IO-compatible note, not a physics paper. It uses quantum mechanical examples to block a potential misreading: that IO's structural framework applies only to classical or macroscopic organization.`,
    connections: `Depends on: Paper 1 (IO — Main Paper). Sits within the Ontology cluster as a clarificatory note on the foundational regime of Difference.`,
    role: `A methodological note demonstrating that IO's structural framework is compatible with quantum-mechanical descriptions of reality. Prevents the misreading that IO requires classical determinism or macroscopic organization to apply.`
  },
  '65': {
    synopsis: `How do you build a rigorous philosophical corpus without letting it drift? This paper formalizes the methodology used to construct Informational Ontology itself — a replicable human-AI workflow for developing constraint-disciplined theoretical systems that remain coherent across dozens of papers and hundreds of revision cycles.\n\nThe workflow is constraint-first throughout. It begins with explicit primitive declaration (what the framework assumes as given) and explicit exclusions (what it refuses to explain), then proceeds through structured iterative expansion, adversarial pressure, and version-controlled amendment discipline. Every extension must be dependency-traceable back to declared primitives. Every revision must be classified — as extension, repair, or revision — and versioned. Silent changes are not permitted.\n\nA key architectural principle: the human retains all epistemic authority. Primitive declaration, scope enforcement, drift adjudication, amendment classification, and final stabilization are human functions. AI participation is operational — variation generator, adversarial simulator, large-scale consistency amplifier — not normative. The AI does not determine what counts as a valid primitive or an acceptable explanatory cost. It helps enforce whatever the human has declared valid, at a scale and consistency no individual could maintain manually.\n\nThe paper also formalizes why theoretical incoherence characteristically arises: implicit primitive inflation, vocabulary drift, scope creep, silent revision, and patch accumulation without structural audit. The workflow is designed to surface and neutralize each of these failure modes systematically. It is domain-agnostic — applicable to philosophy, legal theory, systems design, policy modeling, or any constraint-sensitive discipline where coherence across a large body of work is required.`,
    connections: `Depends on: Paper 1 (IO — Main). Companion to Paper 43 (Can AI Participate in Philosophical Method?), which provides the philosophical reflection on the process this paper formalizes operationally.`,
    role: `The methodological specification for the corpus's own construction process — upgraded from a working note (N1) to a full paper. Makes the human-AI workflow replicable by any researcher attempting similar constraint-disciplined theoretical development, and documents the governance architecture that kept the IO corpus coherent across 65 papers.`
  },
  '12': {
    synopsis: `As a lineage persists — as a system continues across time, division, and perturbation — its past transitions don't simply disappear. They leave behind retained structural modifications that accumulate and constrain future reachability. This paper calls that process constraint sedimentation.\n\nSedimentation is defined precisely: it is the recursive closure of retained constraint modifications across ordered continuity. Each new constraint modification entangles with existing retained structure, reshaping what future states remain accessible to the system without violating its identity conditions. Crucially, this narrowing is monotonic at the global level — even if local flexibility is preserved, the overall space of restoration paths contracts over time.\n\nThe paper introduces a key distinction: sedimentation is the mechanism; irreversibility is a regime outcome. Sedimentation does not automatically produce irreversibility — it produces the structural preconditions under which irreversibility becomes possible and increasingly likely. When sedimentation eliminates all restoration paths for a given configuration, that configuration becomes irreversible.\n\nNo teleology, optimization, or adaptive drift is involved. Constraints accumulate because systems persist and each transition commits to a structure — not because anything is aimed at or favored. The result is a geometry of historical depth: older lineages carry more sedimented structure and face narrower reachability.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 9 (Abiogenesis), Paper 11 (Constraint Carriers). Used by: Paper 13 (Invariant Drift), Paper 14 (Constraint Dissolution), Paper 15 (Irreversibility Thresholds), Paper 50 (Freedom, Drift & Renewal), Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability).`,
    role: `The foundational paper of the Geometry cluster. Introduces constraint sedimentation as the core mechanism by which lineage history shapes future reachability. Every subsequent Geometry paper builds on or qualifies the sedimentation account.`
  },
  '13': {
    synopsis: `Sedimentation theory assumes that a system's identity-maintaining boundary conditions remain stable as constraints accumulate. But what if those boundary conditions themselves drift gradually over time — not catastrophically collapsing, but slowly shifting under continued persistence? This paper addresses that question.\n\nInvariant drift is defined as gradual modification of the identity-maintaining constraints that anchor re-identifiability — without any discrete rupture event. The system remains identifiable throughout, but what counts as "the same system" changes incrementally. This creates a subtle problem: sedimented constraints are indexed to the boundary conditions that existed when they were laid down. If those conditions drift, the meaning and stability of prior sedimentation evolves.\n\nThe paper develops structural thresholds for identity failure under drift: conditions under which gradual boundary evolution accumulates to the point where re-identifiability itself becomes untenable. It distinguishes drift from reset (a discontinuous identity event), dissolution (structural unwinding), and teleological adaptation (purposive self-modification). Drift is none of these — it is identity-preserving but slowly reconstructive.\n\nPractical implications extend to how vulnerability and restoration geometry change when the target state for "restoration" is itself a moving reference point.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 12 (Constraint Sedimentation). Used by: Paper 14 (Constraint Dissolution), Paper 50 (Freedom, Drift & Renewal), Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability).`,
    role: `Extends sedimentation theory to the case of evolving identity conditions. Prevents the Geometry cluster from assuming stable boundaries — a refinement required before restoration geometry (Paper 52) can be formalized correctly.`
  },
  '14': {
    synopsis: `Sedimentation accumulates structural constraints over lineage time, progressively narrowing reachable futures. But can that process be reversed? This paper analyzes constraint dissolution — the structural unwinding of sedimented constraint — and the geometry it requires.\n\nDissolving a constraint is not simply the inverse of accumulating one. Accumulated constraints entangle with other retained structure; removing one requires navigating a topology shaped by everything that was added after it. The paper maps the conditions under which de-sedimentation is possible: what structural paths exist for unwinding, what gets blocked by entanglement, and when the topology has been reshaped so thoroughly that prior configurations are no longer reachable even in principle.\n\nA key conceptual move: dissolution is not the same as irreversibility reversal. A system may dissolve some sedimented constraints (local unwinding) while remaining unable to return to a prior overall configuration (global irreversibility). The geometry of de-sedimentation is therefore distinct from the geometry of restoration — dissolution expands local admissible transformation sets without necessarily restoring global reachability.\n\nThe paper operates downstream of both sedimentation (Paper 12) and invariant drift (Paper 13), incorporating the complication that the identity conditions relative to which dissolution is defined may themselves have shifted.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 12 (Constraint Sedimentation), Paper 13 (Invariant Drift). Used by: Paper 50 (Freedom, Drift & Renewal), Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability).`,
    role: `Completes the sedimentation arc by formalizing its inverse. Required for the Restoration Geometry paper (Paper 52) to distinguish dissolution (local unwinding) from full restoration (return to prior reachable configuration).`
  },
  '15': {
    synopsis: `When knowledge, malware, or capability diffuses through replicating digital systems, there is a point at which containment becomes not merely difficult but structurally impossible within realistic operational bounds. This paper analyzes that threshold.\n\nThe core asymmetry: replication succeeds under an existential condition (at least one viable locus capable of reseeding remains), while containment (recall) succeeds only under a universal condition (all loci and all reconstruction pathways are eliminated or neutralized). This is not a practical gap — it is a structural asymmetry between the two operations. Replication grows under existential logic; restoration must satisfy universal coverage.\n\nThe paper formalizes the practical irreversibility threshold: the point at which containment ceases to be a finite recovery problem and becomes indefinite maintenance. Beyond this threshold, you are no longer restoring a prior boundary state — you are stabilizing a new, permanently altered one. The paper distinguishes these carefully: repair (returning to prior boundary state B0) versus reset (stabilizing a new state B1 under continuous enforcement).\n\nWorked numerical examples and illustrations are drawn from malware propagation, leak-driven artifact diffusion, and distributed version-control graphs — but the structural argument applies to any replicating system with sufficient distribution.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 12 (Constraint Sedimentation). Used by: Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability), Paper 55 (Irreversibility in Knowledge Systems).`,
    role: `Provides the formal account of practical irreversibility thresholds in replicating systems. Supplies the existential/universal operator asymmetry that becomes central to Paper 55's analysis of epistemic irreversibility in knowledge diffusion.`
  },
  '16': {
    synopsis: `Many complex systems have structural redundancy: multiple pathways that can preserve system continuity under perturbation. This redundancy (degeneracy) is normally a stabilizing resource. But what happens when those same systems operate under acceleration — where perturbations propagate far faster than restoration mechanisms can activate?\n\nThis paper analyzes reachability collapse under differential scaling. The key insight: acceleration itself does not cause collapse. Collapse arises when perturbation propagation scales faster than restoration propagation. Under this asymmetry, identity-preserving alternatives remain structurally present but fail to activate before identity-boundary crossing occurs — they are unreachable within identity continuity at the moment they would be needed.\n\nIrreversibility therefore arises not from the absence of structural alternatives, but from their temporal inaccessibility. The system's redundancy exists in principle but cannot be accessed in time. This is distinct from standard stability analysis, which focuses on trajectory-response rather than the topology-preserving restoration reachability that IO's framework analyzes.\n\nWorked illustrations from financial markets (flash crashes), public health systems (epidemic tipping points), and distributed software systems demonstrate the mechanism across different domains.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 5 (Resolution Under Degeneracy), Paper 12 (Constraint Sedimentation). Used by: Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability).`,
    role: `Introduces acceleration as a regime-relevant variable in the Geometry cluster. Explains why highly redundant systems can fail catastrophically under speed — a failure mode that requires the reachability geometry framework to diagnose correctly.`
  },
  '27': {
