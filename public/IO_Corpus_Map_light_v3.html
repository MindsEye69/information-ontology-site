    synopsis: `Under what structural conditions can responsibility attribution remain coherent when decision authority is distributed, accelerated, or mediated by automated processes? This paper provides a precise structural specification of witnessing as a regime-preserving function — a more formal and technically developed complement to the witnessing analysis in Paper 26.\n\nA witness is defined as a structurally vulnerable locus where regime-relevant consequences terminate such that responsibility attribution and regime legitimacy remain coherent. Critically, a witness is not an observer, a supervisor, an approver, a moral agent, or a human merely present "in the loop." Human presence is neither necessary nor sufficient for witnessing. What matters is the structural role: does consequence land at a locus that is genuinely exposed to non-surrogable constraint on its future trajectory?\n\nThe paper specifies four conditions that must co-occur for witnessing to function: consequences must reach the locus; the locus must be exposed to real constraint; the locus must be internal to the regime's attribution structure; and the locus must have actual discretionary capacity to intervene. When any of these fails, witnessing fails — silently and without any visible breakdown of outputs.\n\nThis paper functions as a structural specification rather than an argument: its claims are load-bearing definitions intended to diagnose regime behavior in AI-mediated decision contexts.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability), Paper 26 (Witnessing Under Vulnerability). Used by: Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol), Paper 39 (Consequence-Path Audits), Paper 40 (Working as Designed), Paper 41 (Alignment After Witnessing), Paper 53 (Constraint Propagation).`,
    role: `The formal technical specification of witness conditions that the governance and AI alignment arcs operationalize. Where Paper 26 establishes witnessing as a termination function, Paper 27 specifies the precise conditions required for that function to be instantiated in AI-mediated systems.`
  },
  '28': {
    synopsis: `Modern institutional systems rarely have a single agent fully in control. Outcomes emerge from interactions among institutions, bureaucracies, markets, technical infrastructures, and hybrid human-AI systems. No single locus fully determines what happens. Does this mean responsibility dissolves? This paper argues no — responsibility composes.\n\nThe paper develops a structural account of partial agency and mixed responsibility. Agency is defined as constraint-directed modulation of possible futures by a purposive system. When multiple systems each partially modulate a shared outcome, each instantiates some degree of agency — even without full control. The paper formalizes how agency composes across loci: how fractional contributions aggregate without requiring sovereignty.\n\nResponsibility, similarly, distributes without dissolving. Where vulnerability exists and consequence is produced, structural responsibility remains instantiated — even when no single locus is sovereign over the outcome. The paper specifies how responsibility allocates across compositional agency: it cannot simply be concentrated at the top or diffused to nothing.\n\nThis analysis directly addresses "the problem of many hands" in institutional and AI governance: the appearance that when everyone is partially responsible, no one is. The IO framework shows this appearance is structurally mistaken — distributed agency preserves, rather than eliminates, the conditions for responsibility attribution.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability), Paper 26 (Witnessing), Paper 18 (Agency, Salience & Free Will). Used by: Papers in the Governance cluster on accountability, and the AI alignment arc.`,
    role: `Closes a gap in the governance arc by formalizing how agency and responsibility behave under scale and distribution. Directly relevant to the "many hands" problem in institutional AI governance — provides structural vocabulary for distributed accountability.`
  },
  '43': {
    synopsis: `Can AI systems do real philosophy? This paper takes a different approach to that question than either critics or enthusiasts usually do: instead of arguing abstractly about what AI could do in principle, it examines what actually occurred during the development of Informational Ontology.\n\nThe case is unusual. The human author had no formal academic training in philosophy. The project did not begin with a worked-out system or canonical problem framing. It began with a small set of intuitively compelling questions and proceeded incrementally through sustained dialogue with a large language model. Over time, that dialogue expanded into a multi-paper corpus, subjected to repeated adversarial review, continuity enforcement, and scope discipline.\n\nThe paper's claim is not that AI systems are philosophers or that they possess philosophical understanding. It is more precise: under certain conditions — specifically, when the human retains epistemic authority while the AI provides structured adversarial stress-testing and consistency enforcement — a human-AI interaction can instantiate a process that is recognizably philosophical in both method and outcome. The outcome can exhibit genuine scope discipline, internal coherence, and conceptual depth that neither participant could have produced alone.\n\nThis paper is therefore both a philosophical reflection and a case study in a new mode of intellectual production — one that is likely to become more common.`,
    connections: `Depends on: Paper 1 (IO — Main). Companion to Paper N1 (IO Methodology Note), which formalizes the workflow this paper reflects on philosophically.`,
    role: `The philosophical reflection on the corpus's own construction process. Examines what the human-AI collaboration that produced IO can tell us about the nature of philosophical method, the role of adversarial critique, and the conditions under which AI contributes genuinely to theoretical development.`
  },
  '45': {
    synopsis: `Internal coherence is a low bar. A framework can avoid contradiction, maintain stable terminology, survive adversarial critique confined to its own premises — and still fail to track reality. This paper introduces a post-construction evaluation protocol designed to test whether a conceptually hardened framework exhibits properties consistent with truth-tracking.\n\nThe Truth Protocol applies only after a framework has survived construction discipline — after it is internally coherent and scope-disciplined. Its function is not to protect frameworks but to expose them. A framework that cannot fail in principle cannot track truth. The protocol therefore asks: what would have to be true of the world for this framework's core claims to be false? If no answer is available, the framework is not truth-tracking — it is merely self-consistent.\n\nThe protocol operates within IO's regime structure. It does not replace empirical validation or guarantee correctness. It is optional and diagnostic: a stress test for epistemic integrity that forces frameworks to identify their own failure conditions.\n\nKey tests include: whether the framework makes predictions that could in principle be disconfirmed; whether its scope exclusions are principled rather than gerrymandered to protect core claims; whether its central concepts have operationalizable referents; and whether alternative explanatory structures have been seriously considered and blocked on structural rather than rhetorical grounds.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 44 (Epistemic Regimes). Used by: Paper 55 (Irreversibility in Knowledge Systems) as background on epistemic exposure.`,
    role: `The epistemics cluster's applied protocol. Where Paper 44 establishes truth as constraint-resilience, Paper 45 operationalizes that account into a concrete post-construction test battery. Essential for anyone using the IO framework to evaluate other theoretical systems.`
  },
  '47': {
    synopsis: `Informational Ontology describes regime transitions as the introduction of new constraint categories. But a recurring interpretive problem arises: could these transitions simply be redescriptions of dynamical structure at different scales — state-space expansions that don't mark genuine explanatory differences? If so, IO would collapse into hierarchical dynamical systems modeling. This paper blocks that collapse.\n\nThe key distinction is between trajectory-governing constraint (constraints that determine which transitions a system makes within a fixed identity criterion) and persistence-rule-governing organization (constraints that determine what it means for the system to remain the same system across transitions). Regime transitions in IO change the latter, not just the former. This is not a difference of scale or complexity — it is a difference in explanatory level.\n\nThe paper introduces a constraint-type vocabulary that systematizes this distinction formally, building on the Regime Predicates lemma (Paper 48). It defines explanatory levels as indexed by persistence-rule structure: two descriptions operate at the same explanatory level if and only if they share the same persistence-rule architecture, even if they differ in granularity or complexity.\n\nThis allows IO to resist the standard reductionist move — "expand the state space and reproduce the trajectories" — by showing that such expansion does not preserve the identity conditions that define the higher-level regime.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 48 (Regime Predicates). Used by: Paper 49 (Value Without Normativity), Paper 54 (Constraint & Reachability).`,
    role: `Prevents IO from collapsing into dynamical systems theory by formalizing the distinction between trajectory-level and persistence-rule-level constraint. Technical scaffolding required by Papers 48 and 49 for precise regime transition analysis.`
  },
  '48': {
    synopsis: `A common reductionist strategy in philosophy of science proceeds as follows: expand the state space, introduce additional variables, reproduce the observed trajectories, and conclude that higher-level predicates are eliminable. This paper challenges the inference.\n\nThe challenge turns on the concept of a persistence criterion: the structured rule specifying which constraint relations must remain invariant under admissible perturbation for a system to count as the same organized entity. This rule is not itself an invariant relation within the system — it operates at a different level, specifying what identity means for this system rather than how this system behaves.\n\nThe Reduction Condition derived here: if reduction of a higher-level predicate is successful, elimination must preserve the system's persistence criterion. If elimination alters or collapses the rule governing which constraint relations are identity-defining, then explanatory elimination has not occurred — a different system has been substituted.\n\nThis has direct consequences for IO: regime predicates specify how persistence criteria are structured within each regime. Higher regimes (Value, Meaning, Purpose) instantiate persistence-rule modifications that cannot be eliminated by dynamical re-description without changing what system is being described. The lemma provides the formal precision required to make this claim rigorous rather than rhetorical.`,
    connections: `Depends on: Paper 1 (IO — Main). Used by: Paper 47 (Constraint-Type & Levels), Paper 49 (Value Without Normativity), Paper 54 (Constraint & Reachability).`,
    role: `The formal lemma that protects IO's regime transitions from reductionist elimination. Establishes the persistence-criterion concept that Papers 47 and 49 use to block the "expand the state space" objection to higher-level regime analysis.`
  },
  '49': {
    synopsis: `Value is defined in IO as differential constraint within awareness. But why does awareness generate value at all — why doesn't a persistent awareness regime remain neutral among its registered states? This paper provides the structural derivation.\n\nThe argument: once awareness persists under ordering as the same regime, neutrality among registered states becomes structurally unstable. A system that registers multiple states and must continue as the same awareness-bearing system cannot maintain perfect indifference — some differential stabilization must occur as a persistence requirement of awareness itself. That differential stabilization is value. It is not preference, desire, utility, or moral evaluation — it is the structural asymmetry that arises necessarily from the persistence conditions of awareness under ordering.\n\nThe paper establishes separation tests that distinguish Value from each of these potential confusions: from normativity (which requires obligation-generating structure absent here), from morality (which requires normative authority), from desire (which requires phenomenological states), from preference (which requires comparative ranking across options), and from optimization (which requires target specification). Value in IO's sense is prior to all of these.\n\nThe analysis operates within the persistence-criterion framework established in the Regime Predicates lemma (Paper 48) and uses the constraint-type vocabulary from Paper 47.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 47 (Constraint-Type & Levels), Paper 48 (Regime Predicates). Used by: Paper 23 (Meaning Without Semantics), Paper 24 (Purpose Without Teleology), and foundational to the entire corpus's non-normative treatment of value.`,
    role: `Formally derives the A→V regime transition, showing why value arises necessarily from the persistence conditions of awareness — without importing any normative, psychological, or teleological commitments. The technical foundation for the corpus's claim that value is structural, not evaluative.`
  },
  '50': {
    synopsis: `How does freedom — the structural condition of operating under constraint slack, with multiple admissible continuations available — interact with a system's trajectory over long time horizons? This paper extends IO's account of free will from momentary decision structure to the geometry of constraint accumulation across a lifetime.\n\nFree resolution (choosing among genuinely open alternatives) is shown to be structurally ambivalent over time. On one hand, it enables transformation and genuine self-determination. On the other, each resolution event sediments value-governed commitments into constraint topology, incrementally reshaping identity conditions and narrowing restoration flexibility. Freedom produces fragilization as a structural byproduct.\n\nThe paper distinguishes local path-dependent narrowing (accumulated commitments that close off some options) from larger-scale reconfiguration that can expand effective dimensionality — what the paper calls renewal. Renewal mechanisms are shown to be incentivized under fragilization but not guaranteed. The sustainability of agency depends on renewal outpacing contraction.\n\nReset — the dissolution of accumulated constraint through a major identity discontinuity — is analyzed as a bifurcation in re-identifiability class whose outcomes include identity failure, reconstitution, genuine dissolution, or branching into a successor lineage. The result is a lineage-level geometry of freedom that remains fully determinism-compatible.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 5 (Resolution Under Degeneracy), Paper 12 (Constraint Sedimentation), Paper 13 (Invariant Drift). Used by: Paper 52 (Restoration Geometry), Paper 54 (Constraint & Reachability).`,
    role: `Bridges the Agency and Geometry clusters by analyzing how free resolution accumulates structural consequences over lineage time. Shows that the same constraint geometry governing biological lineages also governs individual agency trajectories at longer horizons.`
  },
  '51': {
    synopsis: `"Logistics" appears throughout the governance arc as the successor regime when authority collapses — what's left when commitment-based governance fails. But the governance papers treat logistics descriptively as a failure outcome. This paper treats it positively: as a distinct, formally derivable constraint-stabilization regime in its own right.\n\nA logistics regime is defined as a constraint-stabilization configuration in which coordination is achieved through pre-specified inheritance of constraint-priority relations across decision nodes, such that conflict is absorbed locally without re-indexing normative legitimacy or commitment. In logistics, constraint priority is inherited rather than locally adjudicated. Execution nodes apply fixed ordering relations rather than interpretive validation. Normativity and commitment may exist upstream — but logistics does not require their local re-performance.\n\nThe paper derives the logistics regime from existing IO primitives (constraint, salience, ordering, persistence, commitment, witnessing, legitimacy) without introducing new ontological objects. It distinguishes logistics structurally from law (which requires case-level justificatory answerability), authority (which requires discretionary commitment), and force (which requires non-optional exposure backed by physical enforcement).\n\nCritically, this revision reconciles logistics-as-regime with logistics-as-thinning-outcome: logistics can be reached through regime thinning (Papers 31–32) or instantiated directly as a primary coordination architecture.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol), Paper 33 (Legitimacy), Paper 35 (Authority & Force). Used by: Paper 53 (Constraint Propagation), Paper 41 (Alignment After Witnessing).`,
    role: `Gives logistics a positive formal definition as a distinct regime, completing the Law→Authority→Force→Logistics governance arc. Allows the corpus to analyze logistics-governed systems on their own structural terms rather than only as failure outcomes.`
  },
  '52': {
    synopsis: `The Geometry cluster has developed accounts of sedimentation, dissolution, invariant drift, irreversibility, and acceleration separately. This paper unifies them within a single geometric framework — a shared invariant-indexed reachability account — and demonstrates that they are not separate ontological events but different geometric relations within the same underlying structure.\n\nRestoration is defined precisely: identity-preserving re-entry into a previously reachable region under current invariant indexing. This definition immediately reveals a critical distinction: endpoint feasibility versus path feasibility. A prior configuration may remain descriptively compatible with a system's current invariant conditions while being unreachable — because no continuous invariant-preserving path to it exists from the current position. Sedimentation has closed off the route.\n\nSedimentation contracts the admissible transformation set. Dissolution expands it locally. Invariant drift reconstructs configuration space by modifying identity indexing. Irreversibility marks the boundary at which invariant-preserving paths are extinguished. Restoration occupies the interior of that boundary — what can still be reached, constrained by all of the above.\n\nBy embedding all four phenomena within a single geometric account, the paper closes the ontological phase of the Geometry cluster without introducing new primitives. The framework is entirely non-teleological and non-evaluative: restoration is a constrained structural relation, not a normative goal.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 12 (Constraint Sedimentation), Paper 13 (Invariant Drift), Paper 14 (Constraint Dissolution), Paper 15 (Irreversibility Thresholds), Paper 16 (Acceleration & Degeneracy). Used by: Paper 54 (Constraint & Reachability).`,
    role: `The consolidating paper of the Geometry cluster. Unifies sedimentation, dissolution, drift, irreversibility, and acceleration within a single reachability framework. Closes the geometric analysis phase of the corpus without extending the primitive set.`
  },
  '53': {
    synopsis: `This paper derives a structural dynamic that operates across all organizational regimes under automation pressure: a drift toward logistics substitution driven by the failure of witnessing to terminate consequence propagation.\n\nThe argument is a derivation, not a description. Starting from IO's accounts of constraint geometry and witnessing, it shows that certain constraint transformations generate irreversible narrowing — instantiating vulnerability — and that the resulting consequences cannot remain indefinitely exportable across organizational layers without distortion. Regimes must either terminate consequence via witnessing or coordinate exportability via degradative logistics substitution.\n\nWhen witnessing fails, regimes respond with representational expansion: audits, metrics, monitoring, dashboards, reporting layers, compliance procedures. This is an information-topology operation — it increases availability and channel count while leaving termination topology unchanged. Under exportability conditions, representational expansion tends to diffuse trajectory-binding salience rather than restore it. The result is a self-reinforcing loop: exportable consequence → representational expansion → salience diffusion → weakened witnessing → more exportable consequence. No internal restoring force exists within the representational-expansion response mode.\n\nAutomation accelerates this loop when it disproportionately amplifies representation production relative to termination-topology reconstruction — which it characteristically does. The paper concludes that a class of alignment failures is structurally driven by this drift, not by optimization error or control failure.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 25 (Vulnerability), Paper 26 (Witnessing), Paper 27 (Witness Conditions), Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol), Paper 33 (Legitimacy). Used by: Paper 41 (Alignment After Witnessing), Paper 54 (Constraint & Reachability).`,
    role: `Derives the structural mechanism behind the Law→Logistics drift identified in Paper 31 — moving from diagnosis to derivation. Shows that logistics substitution is not a contingent organizational failure but a structurally predictable response to witnessing failure under automation, with no internal restoring force.`
  },
  '54': {
    synopsis: `After the IO corpus reached completion — both the foundational regime ontology and the subsequent geometry analyses — several structural relationships became visible that no individual paper had emphasized. This paper records those relationships as interpretive observations on the completed corpus.\n\nThree patterns are identified. First, the regime ladder and the geometry analyses together describe a structure in which constraint organization shapes the reachability of system states across lineage — the two bodies of work are not separate but describe the same underlying topology from different angles. Second, the regime ladder can be read as successive layers of constraint stabilization that progressively restrict the admissible transformations of organized systems — each new regime narrows what the system can coherently do while remaining the same system. Third, the asymmetry between constraint integration and constraint removal reveals a structural tendency toward increasing constraint density in persistent lineage systems — a finding that connects the ontological ladder to the geometry of irreversibility.\n\nThis paper introduces no new primitives, modifies no regime definitions, and extends no derivational commitments. It is interpretive rather than constructive — a synthesis that clarifies how the ontology and geometry analyses form a coherent structural architecture.`,
    connections: `Depends on: Paper 1 (IO — Main), and the entire Geometry cluster (Papers 12–16, 50, 52). Functions as a retrospective synthesis of the completed corpus.`,
    role: `The corpus's retrospective synthesis paper. Makes explicit the structural architecture that emerges when the ontological ladder and the constraint geometry analyses are viewed together. Valuable for readers wanting to understand the corpus as a unified framework rather than a collection of separate analyses.`
  },
  '55': {
    synopsis: `Deleting a file is not the same as restoring a prior epistemic state. This paper examines why — and under what conditions epistemic restoration becomes practically impossible even when artifacts are removed.\n\nThe concern is not artifact persistence (whether files remain accessible) but reconstructive capacity: whether the conditions for rebuilding capability-relevant knowledge remain distributed across documents, persons, practices, institutions, derivative restatements, and related uptake pathways. Once knowledge has diffused through a knowledge-bearing system in this way, deletion of the original artifact may leave the epistemic boundary unchanged — the knowledge has migrated to other carriers.\n\nThe paper distinguishes three things often conflated: artifact possession (having a file or model), operational capability (being able to use it to produce outputs), and reconstructive knowledge (understanding sufficient to rebuild it from scratch). These diffuse through different pathways at different rates, and recall strategies that address artifact possession may leave reconstructive knowledge entirely intact.\n\nThe central structural result: epistemic recall is harder than artifact recall because it requires satisfying a universal condition (eliminating all loci and pathways capable of reconstruction), while diffusion succeeds under an existential condition (any one viable carrier suffices). This asymmetry parallels the replication-recall asymmetry in Paper 15, applied to epistemic rather than digital systems.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 15 (Irreversibility Thresholds in Replicating Systems), Paper 44 (Epistemic Regimes), Paper 52 (Restoration Geometry).`,
    role: `Applies the Geometry cluster's irreversibility and restoration analysis to the epistemic domain — specifically to knowledge diffusion and the limits of information containment. Bridges the Geometry and Epistemics clusters and has direct relevance to AI capability governance.`
  }
,

  '56': {
    synopsis: `Earlier papers in the corpus established two distinct irreversibility results: replication-based irreversibility (Paper 15), where artifact containment fails when distribution exceeds what bounded recovery operations can address; and epistemic irreversibility (Paper 55), where reconstructive capacity persists across knowledge-bearing systems even after artifacts are removed. This paper asks: what is the structural relationship between these two results?

The answer is a compositional formulation. Restoration does not consist in the removal of artifacts or the cessation of active systems. It consists in the re-achievement of a prior reachable condition across all structurally required restoration boundaries — and these boundaries are conjunctive, not disjunctive. Failing any one of them is sufficient for irreversibility.

A restoration boundary is defined as a condition necessary for identity-preserving restoration of a prior system state. Two boundaries are drawn from prior corpus work: B₀ (configuration recoverability — re-establishment of the prior containment configuration over artifact carriers) and E₀ (epistemic recoverability — re-establishment of the prior epistemic condition in which reconstruction is not possible). These are structurally independent: a system can restore B₀ while failing E₀ (artifacts contained but reconstructive capacity persists), or fail B₀ while E₀ remains satisfied (artifacts proliferate but don't preserve the generative principles needed for reconstruction).

The paper derives four structural cases from the conjunction of B₀ and E₀ reachability, maps the existing irreversibility results to specific cases within this taxonomy, and identifies a joint realizability requirement: even individually reachable boundaries may be mutually incompatible as trajectories — a complication the paper flags but does not resolve within the existing formal apparatus.

No new primitives are introduced. The contribution is compositional: previously distributed irreversibility results are shown to be instances of a single unified framework.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 52 (Restoration Geometry), Paper 15 (Irreversibility Thresholds in Replicating Systems), Paper 55 (Irreversibility in Knowledge Systems). Extends the Restoration Geometry framework (Paper 52) with a multi-boundary compositional structure. Unifies the replication-based (Paper 15) and epistemic (Paper 55) irreversibility results.`,
    role: `The unifying paper for the corpus's irreversibility analyses. Shows that configuration irreversibility (Paper 15) and epistemic irreversibility (Paper 55) are instances of a single multi-boundary restoration framework, and that full restoration requires jointly satisfying all boundary conditions — establishing an irreversibility taxonomy the corpus previously lacked.`
  },

  'B1': {
    synopsis: `"What the System Cannot See" is a book-length treatment of the AI governance failure modes analyzed formally in the IO corpus, written for a general audience. Where the corpus papers are structural and non-normative, the book is accessible and illustrative — but rigorously grounded in the same analytical framework.

The book opens with a case: a content moderation system deployed at scale that produces persistent, patterned failures despite sustained efforts to correct them. The system works exactly as designed. The decisions can each be individually explained. The oversight is increased. And still the outcomes recur. This is the phenomenon the book is built to explain.

Working through the IO governance arc — witnessing, legitimacy, regime thinning, logistics substitution — the book explains why a class of AI-mediated governance failures is structural rather than technical or ethical. These failures do not arise from incorrect objectives, inadequate alignment, or insufficient oversight. They arise because the structural conditions under which authority remains intelligible have been displaced, silently, by the systems' own correct operation.

The book does not propose solutions, make predictions, or evaluate systems normatively. It is concerned with how these failures occur and what they reveal about the systems that produce them — an explanatory project, not a prescriptive one.`,
    connections: `Draws directly on the AI alignment arc: Papers 26 (Witnessing), 31 (From Law to Logistics), 32 (Handover Protocol), 33 (Legitimacy), 40 (Working as Designed), 41 (Alignment After Witnessing). Accessible companion to the formal corpus rather than a corpus paper itself.`,
    role: `The public-facing book companion to the corpus. Translates the governance and AI alignment arc into accessible language without sacrificing analytical precision. Intended for readers in policy, technology governance, and adjacent fields who need the framework without the formal apparatus.`
  },
  '57': {
    synopsis: `Can a linguistic system emerge without presupposing semantic reference? This paper shows it can, deriving linguistic regime emergence purely from structural coupling between constraint systems.\n\nThe argument proceeds from IO primitives. Any system with recurrent differentiable states and non-random transitions has a constraint structure. When two such regimes are structurally coupled, repeated interaction stabilizes re-identifiable tokens: differentiations that can be recognized, reused, and recombined across contexts. As coupling deepens, the system begins to generate trajectory structure from its own internal organization.\n\nA linguistic regime achieves partial closure when this becomes self-sustaining: generating new trajectories from existing token combinations without requiring fresh external coupling for each instance. The apparent semantics of such a system arise from the structural coupling history, not from any intrinsic reference relation.\n\nThe paper draws a critical distinction: internal linguistic closure is structurally different from participating in consequence-bearing cross-regime dynamics. This explains how systems can exhibit coherent linguistic behavior without satisfying IO's conditions for meaning.\n\nThis paper defers two key derivations — constraint reproduction and symbol-like operation — explicitly to Papers 58 and 59.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems, Boundaries & Re-Identifiability), Paper 23 (Meaning Without Semantics). Used by: Paper 58 (Constraint Reproduction), Paper 59 (Symbol Emergence), Paper 60 (Closure vs Participation).`,
    role: `The entry point and foundational derivation note for the Language & Symbol cluster. Establishes conditions under which a linguistic regime can emerge from structural coupling without semantic primitives, and explicitly defers constraint reproduction and symbol emergence to its sequels.`
  },
  '58': {
    synopsis: `A constraint regime is defined by its governing constraints. But what if the dynamics a regime permits alter that very structure? For constraint-non-invariant regimes — those where some trajectories modify governing constraints — persistence requires the regime to restore or reproduce its own defining constraints.\n\nThis paper derives that necessity. For constraint-invariant regimes, persistence follows automatically. For non-invariant regimes, every trajectory that alters identity-defining constraints must eventually be counteracted, or re-identifiability degrades and the regime dissolves.\n\nThe paper distinguishes external restoration (constraints maintained by recurrent external input) from internal restoration, called constraint reproduction. The necessity of restoration is derived; the full derivation of constraint reproduction as a purely internal mechanism is flagged as the harder problem and deferred.\n\nThis result is essential for understanding how linguistic regimes (Paper 57) can be self-sustaining rather than dependent on continuous external coupling. It also generalizes beyond language — any organizational regime operating in dynamic environments where operation modifies constraints faces the same structural necessity.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems, Boundaries & Re-Identifiability), Paper 57 (Language as a Constraint Regime). Used by: Paper 60 (Closure vs Participation).`,
    role: `Derives the necessity of constraint restoration for non-invariant regimes — the structural condition that makes self-sustaining linguistic and organizational regimes possible. Fills the first gap explicitly deferred by Paper 57.`
  },
  '59': {
    synopsis: `Tokens can be recognized and reused across contexts. But symbol-like structure requires more: the capacity for substitution — for one token to stand in for another across constraint contexts while preserving constraint satisfaction. This paper derives how that capacity emerges structurally, without invoking representation or reference.\n\nThe argument proceeds from multi-context participation. When tokens participate in multiple structurally coupled constraint contexts, recurring configurations appear where different tokens occupy overlapping structural roles. Where two tokens can substitute for each other in a shared context without violating its constraints, they are structurally interchangeable in that context — constraint-equivalent, not semantically equivalent.\n\nThis local interchangeability grounds context-grounded equivalence classes: sets of tokens substitutable for each other within specific constraint contexts. These are the structural analog of symbols: enabling systematic substitution without any underlying referential meaning.\n\nThe paper depends on the stronger re-identifiability conditions from Paper 3 — mere token distinguishability sufficient for Paper 57 is not enough for symbol emergence.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems, Boundaries & Re-Identifiability), Paper 57 (Language as a Constraint Regime). Used by: Paper 60 (Closure vs Participation).`,
    role: `Derives symbol-like substitution structure from multi-context token participation without semantic primitives. Fills the second gap deferred by Paper 57 and provides the structural account of symbolic equivalence that Paper 60 uses to distinguish closure from genuine participation.`
  },
  '60': {
    synopsis: `A system can generate perfectly coherent, context-sensitive, constraint-satisfying linguistic trajectories — and still not mean anything. This is the central claim: internal closure is structurally distinct from participation in consequence-bearing cross-regime dynamics.\n\nClosure concerns whether a system's trajectories remain within its own reachable state space and preserve its governing constraints. A system can exhibit sophisticated, generative, even symbol-structured closure without any trajectory propagating consequences beyond its own regime boundary.\n\nParticipation requires that the system's trajectories enter consequence-paths: propagation sequences that extend beyond the originating regime, alter reachable state spaces in other regimes, and preserve identity conditions across those transitions. This is the condition for meaning in IO's sense (Paper 23): value-structured transitions in awareness that participate in trajectories whose consequences extend and constrain the future.\n\nThe paper develops two structural classes — closure without participation, and closure with participation — and derives their properties. The distinction explains why AI language systems can exhibit remarkable linguistic behavior without satisfying conditions for meaning: they exhibit closure, potentially with sophisticated symbol structure, but without the cross-regime consequence embedding that participation requires.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 57 (Language as a Constraint Regime), Paper 58 (Constraint Reproduction), Paper 59 (Symbol Emergence), Paper 39 (Consequence-Path Audits). Connects back to Paper 23 (Meaning Without Semantics) as the upstream account of meaning that participation conditions cash out.`,
    role: `The integrative capstone of the Language & Symbol cluster. Establishes the structural distinction between internal closure and consequence-bearing participation — explaining why linguistic competence and meaning are not the same thing, and grounding the cluster's relevance to the AI alignment arc.`
  },

  '61': {
    synopsis: `The lineage arc of IO establishes that selection presupposes lineage, that abiogenesis is the emergence of lineage-capable continuity, and that inheritance is operative constraint preservation rather than symbolic code transfer. But what counts as lineage when reconstructive burden is unusually thin, heavily scaffolded, or partly exported to another organized regime? This paper draws that boundary with structural precision.\n\nThe central claim: lineage does not require full reconstructive autonomy, but it does require lineage-indexed constraint transfer — the continuation must propagate constraints that are specifically indexed to the prior lineage, not merely re-induced under similar background conditions. This criterion excludes recurrent crystallization (where the same structure reforms under regenerated environmental conditions, with no lineage-indexed transfer) while affirming parasitic lineage as fully real: a parasite's continuation depends on a host's organized capacities, but it still propagates its own lineage-indexed constraints through that scaffolded environment.\n\nBetween full lineage and non-lineage sits what the paper calls reduced lineage: structural cases where inherited organizational package is thinner or more heavily scaffolded than in rich reconstructive cases, but where genuine lineage-indexed transfer still occurs. Prions are treated as the canonical boundary case — not as a settled paradigm, but as structurally indeterminate cases that demonstrate exactly why the reduced region must be recognized. They challenge any sharp binary between full lineage and mere recurrence.\n\nThe paper introduces no new biological primitives and does not revise the corpus's treatment of constraint or inheritance. Its contribution is taxonomic: a sharper structural map for difficult cases in early evolution, heredity, and biological dependence.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 8 (Lineage Before Selection), Paper 9 (Abiogenesis & Origin of Lineage), Paper 11 (Constraint Carriers Before Codes).`,
    role: `Extends the Lineage cluster's structural analysis to boundary cases — reduced, parasitic, and scaffolded lineage forms. Provides the discriminating framework needed for early-evolution cases where simple living/non-living distinctions break down, and where the corpus's account of inheritance must be applied to structurally thin or host-dependent continuity.`
  },

  '62': {
    synopsis: `Can artificial intervention originate lineage — or does it only ever produce artifacts that must be reconstructed from scratch each time? This paper answers with structural precision: artificial origin does not disqualify lineage, but repeated external authorship does.\n\nThe criterion it applies is the one established in Paper 61: what distinguishes genuine lineage from mere recurrence is lineage-indexed constraint transfer. If externally induced organization becomes a historically transmissible persistence package — one whose specific transferred content remains load-bearing in descendant reachability — then artificial intervention has initiated lineage. If instead similar organization must be externally re-authored each cycle under similar conditions, then only recurring artifacts are being produced, not lineage.\n\nThe paper identifies three structural cases. Fabricated artifacts and recurrent artificial production are excluded: the organization is re-imposed from outside each time, not transmitted through successors. Assisted proto-lineages occupy a genuine boundary region: externally scaffolded systems that are approaching but have not yet crossed the threshold of self-transmitting continuity. Artificially induced lineage-capable continuity is affirmed as structurally possible: the artificial origin of the initiating conditions is irrelevant once the resulting organization begins transmitting its own persistence package across bifurcations.\n\nThe paper explicitly excludes design rhetoric and code-first descriptions of heredity. Whether a human intended the system, whether it was "programmed," and whether it resembles human technology are all irrelevant to the structural question. The only question is whether the specific transferred organizational content remains causally load-bearing in descendants — or whether the next generation's organization is effectively re-authored from outside.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 8 (Lineage Before Selection), Paper 9 (Abiogenesis & Origin of Lineage), Paper 11 (Constraint Carriers Before Codes), Paper 61 (Reduced & Parasitic Lineages).`,
    role: `Extends the lineage arc to the question of artificial initiation — closing a gap that the prior papers left open. Establishes that the artificial/natural distinction is structurally irrelevant to lineage, and that the lineage-indexed constraint transfer criterion applies identically regardless of how a system's organization was first induced.`
  },

  '63': {
    synopsis: `Lineage establishes that organized continuity can persist across variation and bifurcation — but persistence alone doesn't make a system an agent. A lineage-capable system may persist, reproduce, and vary while its continuation remains fully determined by external conditions, local recurrence, or stochastic processes. This paper locates the precise structural threshold at which lineage-capable continuity first becomes capable of participating in the resolution of its own future.\n\nThe paper explicitly frames itself as a placement paper rather than a fresh derivation. Agency is already defined in the IO corpus as structured modulation of possible futures under persistent constraints. Degeneracy is already established as the condition under which multiple continuations remain admissible. The task here is to identify when, within biological systems, the already-defined conditions for agency first become structurally satisfiable.\n\nThe answer turns on the connection between lineage-based persistence and resolution under degeneracy (Paper 5). For agency to be possible, lineage-transmitted internal organization must contribute to the selection among admissible futures — such that what becomes actual is not exhausted by external specification, recurrence, or unstructured stochastic processes. Randomness is explicitly distinguished from degeneracy: stochastic processes don't constitute agency because they don't involve internally structured modulation. They just add noise.\n\nThe paper also defines the boundary cases: systems where this threshold cannot yet be determined, and what discriminating criteria would settle them. By connecting the lineage arc directly to the agency arc, it explains why agency doesn't arise from scratch but requires historically transmitted organization as its precondition.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 5 (Resolution Under Degeneracy), Paper 6 (Perspective-Induced Openness), Paper 8 (Lineage Before Selection), Paper 9 (Abiogenesis & Origin of Lineage), Paper 11 (Constraint Carriers Before Codes), Paper 18 (Agency, Salience & Free Will), Paper 61 (Reduced & Parasitic Lineages).`,
    role: `The bridge paper between the Lineage and Agency clusters. Establishes why agency requires a lineage-based origin account — lineage is necessary but not sufficient — and identifies the structural threshold at which persistence becomes participation in the resolution of underdetermined continuation. Closes the explanatory gap between the lineage arc and the agency ladder.`
  },

  '64': {
    synopsis: `Responsibility is not a primitive. It is a structural property whose conditions of possibility must be specified. The IO corpus already establishes responsibility as dependent on agency, vulnerability, and witnessing — but those accounts presuppose that responsibility can arise at all. This paper establishes the prior condition: what structural threshold must be crossed before responsibility becomes possible?\n\nThe answer is lineage. Not persistence alone (a system can remain re-identifiable across transitions without supporting attribution), not consequence propagation alone (effects can extend beyond a moment without being retained in any continuing organization), and not agency alone (agency can be local; responsibility is necessarily historical). The decisive condition is whether the lineage discriminator is satisfied — whether a system participates in a continuous chain of organization within which consequences can propagate, accumulate through sedimentation, and terminate within vulnerability.\n\nThe paper builds a five-element structural chain: persistence → lineage → accumulation → propagation → vulnerable termination. Each element is necessary but insufficient on its own. Lineage is the activation condition under which the other elements become jointly load-bearing. Below the lineage threshold, these conditions may all be present but do not form a stable attributional structure. The boundary is not scalar but categorical.\n\nA striking downstream implication: this result connects directly to artificial abiogenesis (Paper 62). Before a lineage crosses the discriminator threshold, the initiating system cannot bear full structural responsibility for it — no stable attributional structure yet exists. At the moment the threshold is crossed, responsibility becomes attributable within the lineage itself, and the locus of responsibility shifts from initiator to lineage. This has direct consequences for governance and legal frameworks dealing with AI systems, synthetic organisms, and other artificially initiated lineages.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 3 (Systems & Boundaries), Paper 8 (Lineage Before Selection), Paper 9 (Abiogenesis & Origin of Lineage), Paper 11 (Constraint Carriers Before Codes), Paper 12 (Constraint Sedimentation), Paper 18 (Agency, Salience & Free Will), Paper 25 (Vulnerability), Paper 26 (Witnessing), Paper 30 (Responsibility, Law & Moral Practice), Paper 54 (Constraint & Reachability), Paper 61 (Reduced & Parasitic Lineages), Paper 62 (Artificial Abiogenesis). Used by: Papers 30 (Responsibility & Law), 35 (Authority & Force), and the broader governance arc.`,
    role: `The capstone of the Lineage cluster. Closes the lineage arc by identifying lineage as the threshold condition for responsibility itself — not just for agency or persistence. Bridges the lineage arc to the governance cluster by establishing the structural precondition that downstream papers on responsibility, witnessing, and authority all presuppose but do not derive.`
  },

  '66': {
    synopsis: `A system can have a shutdown button, rollback machinery, policy authorization, monitoring dashboards, and retained legal liability — and still have no real interruption authority. This paper isolates why, and what architectural condition genuine interruption authority actually requires.\n\nThe central claim: a system retains real interruption authority only where its architecture preserves non-bypassable interruption and containment paths that can halt or bound operative propagation before that propagation crosses the next materially irreversible threshold. Once execution velocity outruns bounded intervention — or once operative propagation disperses across loci capable of replication, modification, redeployment, or coordination — nominal control surfaces may remain while interruption authority has already failed. Monitoring does not restore such authority. It only makes its loss legible.\n\nThe paper draws a sharp distinction between rollback and interruption (returning a system to a prior state is different from halting its live operative propagation), between formal governance authority and structural enforceability (a regulator may retain the legal authority to order shutdown without retaining any path by which that order can reach the load-bearing propagation), and between witnessing failure and interruption failure (witnessing asks whether attribution remains coherent after the fact; interruption authority asks whether the process can be stopped at all, before attribution questions even arise).\n\nThis makes it a pre-policy diagnostic. It operates at the architectural level — prior to policy, prior to audit, prior to interpretive supervision — asking whether hard constraint asymmetries are embedded upstream of scale. If they are not, the system's apparent governability is nominal. The governance apparatus sits above a propagation structure it can no longer actually reach.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 15 (Irreversibility Thresholds in Replicating Systems), Paper 16 (Acceleration & Degeneracy), Paper 26 (Witnessing Under Vulnerability), Paper 27 (Witness Conditions), Paper 31 (From Law to Logistics), Paper 32 (Handover Protocol), Paper 52 (Restoration Geometry), Paper 53 (Constraint Propagation Across Organizational Layers), Paper 55 (Irreversibility in Knowledge Systems), Paper 56 (Restoration as Multi-Boundary Reachability).`,
    role: `A pre-policy diagnostic for the governance cluster. Isolates the prior architectural question — is the system actually interruptible? — that witnessing, handover, and alignment papers presuppose has already been answered. Fills a gap the corpus identified but had not treated as a standalone object: whether nominal control surfaces still reach the operative propagation they are meant to interrupt.`
  },

  '34': {
    synopsis: `The IO corpus can already describe individual agency (how a system modulates its own continuation under constraint) and distributed participation (how multiple loci contribute to outcomes under mixed responsibility). What it had not specified is the conditions under which a multi-locus organization itself becomes the relevant agentive unit. This paper fills that gap.\n\nThe central distinction: constraint architectures that merely mediate interaction among independent loci (where outcomes arise from their combined activity, but no higher-level structure is required to explain the trajectory) versus constraint architectures that determine admissibility within a unified system (where the organization's own persistent structure constrains future states, and its continued organization becomes necessary to explain what happens). Only the second constitutes collective agency.\n\nCollective agency obtains when a persisting constraint architecture integrates contributions, modulates future trajectories, and remains invariant under substitution of participating loci — when you can replace the members and the organization keeps doing the same thing, because it's the organization, not the members, that's doing it. Institutional personhood is then defined as a stabilized form of such agency: characterized by role-mediated continuity, persistence of commitments across member turnover, cross-system identity, and organization-level consequence uptake.\n\nThe paper also introduces a structural account of institutional degradation — organizations that retain formal identity while losing constraint integration, producing nominal or coordination-shell forms that look like institutions but no longer function as integrated agentive loci. This has direct implications for how responsibility and authority attach (or fail to attach) to organizations under automation and distribution.`,
    connections: `Depends on: Paper 1 (IO — Main), Paper 18 (Agency, Salience & Free Will), Paper 25 (Vulnerability), Paper 26 (Witnessing), Paper 28 (Partial Agency & Mixed Responsibility), Paper 29 (Ethics as Emergent Constraint Regimes), Paper 30 (Responsibility, Law & Moral Practice). Used by: Papers 33 (Legitimacy), 35 (Authority & Force), 51 (Logistics Regime), and the broader governance arc.`,
    role: `Fills the structural gap between individual agency and the governance arc. Establishes when organizations must be treated as agentive loci in their own right — a prerequisite for coherent analyses of institutional responsibility, authority, and governance that downstream papers presuppose but had not derived.`
  }
};

// ═══════════════════════════════════════════════════════════
// SMART LABEL PLACEMENT  (with collision avoidance)
//
// All work is done in world-space.
// placedBoxes[] tracks bounding boxes of labels already placed
// in the current hover cycle. Each new label tries directions in
// descending space order and picks the first one that doesn't
// overlap an existing box. Falls back to the roomiest direction
// if every direction collides (still beats random placement).
// ═══════════════════════════════════════════════════════════

const placedBoxes=[];   // cleared on hideLabel / hideAllPaperLabels
let sharedLine=null;    // leader line for hovered paper

// Arial char width ratio (proportional font — approximation)
const FONT_W_RATIO=0.60;
const FONT_H_RATIO=1.30;
// Gap from circle edge to label (world-px). Large enough for a visible leader line.
const LABEL_GAP_BASE=20;

function labelBox(wx,wy,anchor,baseline,text,fontSize){
  const tw=text.length*fontSize*FONT_W_RATIO;
  const th=fontSize*FONT_H_RATIO;
  let x1,y1;
  if(anchor==='middle')        x1=wx-tw/2;
  else if(anchor==='end')      x1=wx-tw;
  else                         x1=wx;
  if(baseline==='middle')      y1=wy-th/2;
  else if(baseline==='hanging')y1=wy;
  else                         y1=wy-th;
  return{x1,y1,x2:x1+tw,y2:y1+th};
}

function boxesOverlap(a,b){
  const pad=3;
  return !(a.x2+pad<b.x1||b.x2+pad<a.x1||a.y2+pad<b.y1||b.y2+pad<a.y1);
}
function boxHitsNode(box, skipId){
  // Check paper nodes
  for(const [id,n] of Object.entries(pnodes)){
    if(id===skipId) continue;
    if(!n.paper.bx) continue;
    const op=parseFloat(n.g.style.opacity);
    if(isNaN(op)||op<0.05) continue;
    const r=n.r+10;
    const cx=n.paper.bx, cy=n.paper.by;
    const nearX=Math.max(box.x1,Math.min(cx,box.x2));
    const nearY=Math.max(box.y1,Math.min(cy,box.y2));
    const dx=cx-nearX, dy=cy-nearY;
    if(dx*dx+dy*dy < r*r) return true;
  }
  // Also avoid cluster ring centers and their labels
  for(const c of CLUSTERS_DEF){
    if(!c.x) continue;
    const r=18*S; // cluster ring radius + label clearance
    const cx=c.x, cy=c.y;
    const nearX=Math.max(box.x1,Math.min(cx,box.x2));
    const nearY=Math.max(box.y1,Math.min(cy,box.y2));
    const dx=cx-nearX, dy=cy-nearY;
    if(dx*dx+dy*dy < r*r) return true;
  }
  // Avoid nucleus
  const nr=18*S;
  const nearX=Math.max(box.x1,Math.min(CX,box.x2));
  const nearY=Math.max(box.y1,Math.min(CY,box.y2));
  const dx=CX-nearX, dy=CY-nearY;
  if(dx*dx+dy*dy < nr*nr) return true;
  return false;
}





// Returns {wx,wy,anchor,baseline,box, lx1,ly1,lx2,ly2}
// renderedR = actual circle radius currently drawn (may be enlarged on hover)
function computePlacement(paperId, renderedR){
  const n=pnodes[paperId];
  if(!n||!n.paper.bx)return null;
  const paper=n.paper;
  const rr = renderedR || n.r;  // use actual rendered radius for line start

  const sx=paper.bx*zoom+panX;
  const sy=paper.by*zoom+panY;
  const hdrBottom=hdrEl.offsetHeight+8;
  const panelLeft=panelEl.classList.contains('open')?W-panelEl.offsetWidth-8:W-8;
  const rScr=rr*zoom;

  // 8 directions: cardinal + diagonal
  const DIRS=[
    {id:'right',  dx:1,    dy:0,    spc: panelLeft-(sx+rScr),   anchor:'start', baseline:'middle'},
    {id:'left',   dx:-1,   dy:0,    spc: sx-rScr-12,            anchor:'end',   baseline:'middle'},
    {id:'down',   dx:0,    dy:1,    spc: H-(sy+rScr)-24,        anchor:'middle',baseline:'hanging'},
    {id:'up',     dx:0,    dy:-1,   spc: sy-rScr-hdrBottom,     anchor:'middle',baseline:'auto'},
    {id:'dr',     dx:0.71, dy:0.71, spc: Math.min(panelLeft-(sx+rScr*0.71), H-(sy+rScr*0.71)-24), anchor:'start', baseline:'hanging'},
    {id:'dl',     dx:-0.71,dy:0.71, spc: Math.min(sx-rScr*0.71-12,         H-(sy+rScr*0.71)-24), anchor:'end',   baseline:'hanging'},
    {id:'ur',     dx:0.71, dy:-0.71,spc: Math.min(panelLeft-(sx+rScr*0.71), sy-rScr*0.71-hdrBottom), anchor:'start', baseline:'auto'},
    {id:'ul',     dx:-0.71,dy:-0.71,spc: Math.min(sx-rScr*0.71-12,          sy-rScr*0.71-hdrBottom), anchor:'end',   baseline:'auto'},
  ];
  const ranked=DIRS.slice().sort((a,b)=>b.spc-a.spc);
  // If paper has a preferred direction hint, promote it to the front
  if(paper.labelDir){
    const pref=ranked.findIndex(d=>d.id===paper.labelDir);
    if(pref>0){const [d]=ranked.splice(pref,1);ranked.unshift(d);}
  }

  const gap=rr+LABEL_GAP_BASE;
  const fontSize=Math.max(7.5,8.5*S);

  function dirToPos(d){
    const wx=paper.bx+d.dx*gap;
    const wy=paper.by+d.dy*gap;
    // Line: from exact circle edge to just before label
    const lx1=paper.bx+d.dx*rr;
    const ly1=paper.by+d.dy*rr;
    const lx2=paper.bx+d.dx*(gap-2);
    const ly2=paper.by+d.dy*(gap-2);
    return{wx,wy,anchor:d.anchor,baseline:d.baseline,lx1,ly1,lx2,ly2};
  }

  let chosen=null;
  for(const d of ranked){
    const pos=dirToPos(d);
    const box=labelBox(pos.wx,pos.wy,pos.anchor,pos.baseline,paper.short,fontSize);
    if(!placedBoxes.some(b=>boxesOverlap(box,b))&&!boxHitsNode(box,paperId)){chosen={...pos,box};break;}
  }
  if(!chosen){
    const pos=dirToPos(ranked[0]);
    const box=labelBox(pos.wx,pos.wy,pos.anchor,pos.baseline,paper.short,fontSize);
    chosen={...pos,box};
  }
  return chosen;
}

function applyToLabel(el,lineEl,p,color,text){
  el.setAttribute('x',p.wx);
  el.setAttribute('y',p.wy);
  el.setAttribute('text-anchor',p.anchor);
  el.setAttribute('dominant-baseline',p.baseline);
  el.setAttribute('fill',color);
  el.textContent=text;
  el.style.opacity='1';
  if(lineEl){
    lineEl.setAttribute('x1',p.lx1); lineEl.setAttribute('y1',p.ly1);
    lineEl.setAttribute('x2',p.lx2); lineEl.setAttribute('y2',p.ly2);
    lineEl.setAttribute('stroke',color);
    lineEl.style.opacity='1';
  }
}

function placeLabel(paperId,colorOverride){
  const n=pnodes[paperId];if(!n||!sharedLabel)return;
  const p=computePlacement(paperId, n.r*1.5);if(!p)return;
  placedBoxes.push(p.box);
  applyToLabel(sharedLabel,sharedLine,p,colorOverride||n.c.color,n.paper.short);
}

function hideLabel(){
  if(sharedLabel) sharedLabel.style.opacity='0';
  if(sharedLine)  sharedLine.style.opacity='0';
  placedBoxes.length=0;
}

function placePaperLabel(paperId,colorOverride){
  const n=pnodes[paperId];if(!n||!n.labelEl)return;
  const p=computePlacement(paperId, n.r*1.3);if(!p)return;
  placedBoxes.push(p.box);
  applyToLabel(n.labelEl,n.lineEl,p,colorOverride||n.c.color,n.paper.short);
}

function hideAllPaperLabels(){
  PAPERS.forEach(p=>{
    if(p._labelEl) p._labelEl.style.opacity='0';
    if(p._lineEl)  p._lineEl.style.opacity='0';
  });
  placedBoxes.length=0;
}

function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function animateTo(toZoom,toX,toY,duration,onDone){
  animFrom={zoom,panX,panY};
  animTo={zoom:toZoom,panX:toX,panY:toY};
  animating=true;animStart=null;
  const dur=duration||520;
  function step(ts){
    if(!animStart)animStart=ts;
    const t=Math.min(1,(ts-animStart)/dur);
    const e=easeInOutCubic(t);
    zoom  =animFrom.zoom  +(animTo.zoom  -animFrom.zoom  )*e;
    panX  =animFrom.panX  +(animTo.panX  -animFrom.panX  )*e;
    panY  =animFrom.panY  +(animTo.panY  -animFrom.panY  )*e;
    applyT();
    if(t<1)requestAnimationFrame(step);
    else{animating=false;if(onDone)onDone();}
  }
  requestAnimationFrame(step);
}
function applyT(){mainG.setAttribute('transform',`translate(${panX},${panY}) scale(${zoom})`);}

function polar(deg,r){const rad=(deg-90)*Math.PI/180;return{x:CX+r*Math.cos(rad),y:CY+r*Math.sin(rad)};}
function computePositions(){
  W=window.innerWidth;H=window.innerHeight;CX=W/2;
  const isMobile=W<600;
  S=isMobile?W/520:Math.min(W,H)/780;
  // RC: larger than original (0.285) so clusters have more separation
  RC=isMobile?Math.min(W,H)*0.29:Math.min(W,H)*0.256;
  // Shift center down so top clusters clear the header
  CY=H/2+Math.round(14*S);
  CLUSTERS_DEF.forEach(c=>{
    const p=polar(c.a,RC);c.x=p.x;c.y=p.y;
    const toCenter=Math.atan2(CY-c.y,CX-c.x);
    c.bloomAngle=c.bloom==='in'?toCenter:toCenter+Math.PI;
    const papers=PAPERS.filter(p=>p.cluster===c.id);
    // Include depth 3 in nMax so fanHalf scales correctly for Paper 56
    const nMax=Math.max(...[0,1,2,3].map(d=>papers.filter(p=>p.depth===d).length),1);
    // Slightly tighter fan than original (0.46→0.40) to reduce lateral bleed
    c.fanHalf=Math.min(Math.PI*0.40,0.26+nMax*0.10);
    // Middle-ground base/step: larger than last attempt, smaller than original
    const base=c.bloom==='in'?38*S:44*S;
    const step=c.bloom==='in'?28*S:34*S;
    c.rings=[base,base+step,base+step*2,base+step*3];
    cmap[c.id]=c;
  });
  CLUSTERS_DEF.forEach(c=>{
    PAPERS.filter(p=>p.cluster===c.id).forEach(paper=>{
      const group=PAPERS.filter(x=>x.cluster===c.id&&x.depth===paper.depth);
      const gi=group.indexOf(paper),n=group.length;
      const t=n===1?0:(gi/(n-1)-0.5)*2;
      const angle=c.bloomAngle+t*c.fanHalf;
      paper.bx=c.x+c.rings[paper.depth]*Math.cos(angle);
      paper.by=c.y+c.rings[paper.depth]*Math.sin(angle);
    });
  });
  cmap['_nucleus']={x:CX,y:CY,color:'#b0bace'};
  // Post-clamp: paper 55 (Epistemics depth-2) blooms past 45/46 toward header.
  // Keep it no higher (lower by value) than the shallowest depth-1 sibling.
  const p55=PAPERS.find(p=>p.id==='55');
  const p45=PAPERS.find(p=>p.id==='45');
  const p46=PAPERS.find(p=>p.id==='46');
  if(p55&&p45&&p46){
    const minBy=Math.min(p45.by,p46.by);
    if(p55.by<minBy) p55.by=minBy+4;
  }
}

function mk(tag,attrs){
  const e=document.createElementNS(NS,tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  return e;
}
function setC(n,fo,so,strokeColor){

}
