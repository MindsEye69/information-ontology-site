function buildSVG(){
  while(svgEl.firstChild)svgEl.removeChild(svgEl.firstChild);
  svgEl.setAttribute('width',W);svgEl.setAttribute('height',H);

  // Single world-space group — ALL layers inside so pan/zoom moves everything together
  mainG      =mk('g');svgEl.appendChild(mainG);
  spinesG    =mk('g');mainG.appendChild(spinesG);
  depLinesG  =mk('g');mainG.appendChild(depLinesG);
  bloomLinesG=mk('g');mainG.appendChild(bloomLinesG);

  // Dim overlay lives INSIDE mainG between bg and fg layers.
  // Enormous in world-space so it covers everything at any zoom level.
  fadeOverlay=mk('rect',{x:-50000,y:-50000,width:100000,height:100000,
    fill:'rgb(251,250,247)',opacity:0,'pointer-events':'none'});
  fadeOverlay.style.transition='opacity 0.55s ease';
  mainG.appendChild(fadeOverlay);

  papersG    =mk('g');mainG.appendChild(papersG);
  labelsG    =mk('g');mainG.appendChild(labelsG);
  clustersG  =mk('g');mainG.appendChild(clustersG);

  // Shared label + leader line — repositioned on each hover
  sharedLabel=mk('text',{
    'font-family':'Arial,sans-serif',
    'font-size':Math.max(8,9.5*S)+'px',
    'pointer-events':'none',
    fill:'#ffffff'
  });
  sharedLabel.classList.add('paper-label');
  sharedLabel.style.opacity='0';
  labelsG.appendChild(sharedLabel);

  sharedLine=mk('line',{x1:0,y1:0,x2:0,y2:0,
    stroke:'#ffffff','stroke-width':1.5,'pointer-events':'none'});
  sharedLine.classList.add('paper-label'); // reuses same fade transition
  sharedLine.style.opacity='0';
  labelsG.appendChild(sharedLine);

  // Spines
  CLUSTERS_DEF.forEach(c=>{
    spinesG.appendChild(mk('line',{x1:CX,y1:CY,x2:c.x,y2:c.y,
      stroke:c.color,'stroke-width':0.5,'stroke-opacity':0.12}));
  });

  buildNucleus();
  CLUSTERS_DEF.forEach(buildCluster);
  PAPERS.filter(p=>p.cluster!=='_nucleus').forEach(buildPaper);
  buildDepLines();
  buildLegend();
}

function buildNucleus(){
  [40*S,26*S].forEach(r=>{
    clustersG.appendChild(mk('circle',{cx:CX,cy:CY,r,fill:'none',
      stroke:'#8090a8','stroke-width':0.5,'stroke-opacity':0.18}));
  });
  const paper=PAPERS.find(p=>p.id==='1');
  const r=13*S;
  const circle=mk('circle',{cx:CX,cy:CY,r,
    fill:'#6878a0','fill-opacity':0.18,stroke:'#6878a0','stroke-width':1.2,'stroke-opacity':0.65});
  circle.classList.add('p-circle');circle.style.cursor='pointer';
  const lbl=mk('text',{x:CX,y:CY,'text-anchor':'middle','dominant-baseline':'middle',
    fill:'#3a4a6a','fill-opacity':0.80,'font-family':'Arial,sans-serif',
    'font-size':Math.max(7,9*S)+'px','font-weight':'500','pointer-events':'none'});
  lbl.textContent='IO';
  circle.addEventListener('mouseover',()=>{
    circle.style.fillOpacity=0.32;
    sharedLabel.setAttribute('x',CX);
    sharedLabel.setAttribute('y',CY-(r*1.5+LABEL_GAP_BASE));
    sharedLabel.setAttribute('text-anchor','middle');
    sharedLabel.setAttribute('dominant-baseline','auto');
    sharedLabel.setAttribute('fill','#3a4a6a');
    sharedLabel.textContent=paper.short;
    sharedLabel.style.opacity='1';
    if(sharedLine){
      sharedLine.setAttribute('x1',CX); sharedLine.setAttribute('y1',CY-(r*1.5));
      sharedLine.setAttribute('x2',CX); sharedLine.setAttribute('y2',CY-(r*1.5+LABEL_GAP_BASE-2));
      sharedLine.setAttribute('stroke','#3a4a6a');
      sharedLine.style.opacity='1';
    }
  });
  circle.addEventListener('mouseout',()=>{circle.style.fillOpacity=0.12;hideLabel();});
  circle.addEventListener('click',e=>{e.stopPropagation();showPanel(paper);});
  clustersG.appendChild(circle);clustersG.appendChild(lbl);
}

function buildCluster(c){
  const g=mk('g');g.style.opacity='0';
  const glow=mk('circle',{cx:c.x,cy:c.y,r:25*S,fill:c.color,'fill-opacity':0.06,stroke:'none'});
  glow.style.animation='pulse 3.8s ease-in-out infinite';
  c._ring=mk('circle',{cx:c.x,cy:c.y,r:11.5*S,fill:c.color,'fill-opacity':0.15,
    stroke:c.color,'stroke-width':1.2,'stroke-opacity':0.70});
  const labelGap=13.5*S+6; // ring radius + gap
  const above=c.y<CY;
  const lx=c.x;
  const ly=above ? c.y-labelGap : c.y+labelGap;
  const clLbl=mk('text',{x:lx,y:ly,'text-anchor':'middle','dominant-baseline':above?'auto':'hanging',
    fill:c.color,'fill-opacity':0.80,'font-family':'Arial,sans-serif',
    'font-size':Math.max(7,8.5*S)+'px','letter-spacing':'0.09em','pointer-events':'none'});
  clLbl.textContent=(c.label||c.id).toUpperCase();
  g.appendChild(glow);g.appendChild(c._ring);g.appendChild(clLbl);
  clustersG.appendChild(g);c._g=g;g.style.cursor='pointer';
  g.addEventListener('mouseover',()=>{if(openCluster!==c.id)c._ring.setAttribute('fill-opacity',0.24);showClusterInfo(c);});
  g.addEventListener('mouseout', ()=>{if(openCluster!==c.id&&!fullView)c._ring.setAttribute('fill-opacity',0.12);hideClusterInfo();});
  g.addEventListener('click',e=>{e.stopPropagation();if(!fullView)toggleCluster(c.id);});
  const idx=CLUSTERS_DEF.indexOf(c);
  setTimeout(()=>{g.style.transition='opacity 0.7s';g.style.opacity='1';},300+idx*110);
}

function buildPaper(paper){
  const c=cmap[paper.cluster];if(!c)return;
  const line=mk('line',{x1:c.x,y1:c.y,x2:paper.bx||c.x,y2:paper.by||c.y,
    stroke:c.color,'stroke-width':0.4,'stroke-opacity':0});
  bloomLinesG.appendChild(line);paper._line=line;

  const g=mk('g');
  g.style.transform=`translate(${c.x}px,${c.y}px)`;
  g.style.opacity='0';
  g.style.transition='transform 0.50s cubic-bezier(0.34,1.38,0.64,1),opacity 0.36s';
  const pR=8*S;
  const bfo=paper.status==='locked'?0.22:0.10;
  const bso=paper.status==='locked'?0.80:0.45;
  const bgDisc=mk('circle',{cx:0,cy:0,r:pR,'fill':'var(--bg)','fill-opacity':1,stroke:'none','pointer-events':'none'});
  const circle=mk('circle',{cx:0,cy:0,r:pR,fill:c.color,stroke:c.color,'stroke-width':1.0});
  circle.classList.add('p-circle');
  circle.style.fillOpacity=bfo;circle.style.strokeOpacity=bso;circle.style.cursor='pointer';
  const numT=mk('text',{x:0,y:0.5,'text-anchor':'middle','dominant-baseline':'middle',
    fill:'#2a2010','fill-opacity':0.65,'font-family':'Arial,sans-serif',
    'font-size':Math.max(5,6.8*S)+'px','pointer-events':'none'});
  numT.textContent=paper.num;
  g.appendChild(bgDisc);g.appendChild(circle);g.appendChild(numT);papersG.appendChild(g);

  // Per-paper label element (used only in full-view dep hover for connections)
  const labelEl=mk('text',{
    'font-family':'Arial,sans-serif',
    'font-size':Math.max(7.5,8.5*S)+'px',
    'pointer-events':'none',
    fill:c.color,x:paper.bx||c.x,y:paper.by||c.y
  });
  labelEl.classList.add('paper-label');
  labelEl.style.opacity='0';
  labelsG.appendChild(labelEl);paper._labelEl=labelEl;

  // Per-paper leader line
  const lineEl=mk('line',{x1:0,y1:0,x2:0,y2:0,
    stroke:c.color,'stroke-width':1.5,'pointer-events':'none'});
  lineEl.classList.add('paper-label');
  lineEl.style.opacity='0';
  labelsG.appendChild(lineEl);paper._lineEl=lineEl;

  circle.addEventListener('mouseover',()=>{
    circle.setAttribute('r',pR*1.5);
    setC({circle},0.30,bso,c.color);
    placeLabel(paper.id);
    showClusterInfo(c);
    if(fullView)setDepHover(paper.id);
    else if(openCluster===c.id)setCrossClusterHover(paper.id);
  });
  circle.addEventListener('mouseout',()=>{
    circle.setAttribute('r',pR);
    setC({circle},panelPaper===paper.id?0.28:bfo,bso,c.color);
    hideLabel();
    hideClusterInfo();
    if(fullView)clearDepHover();
    else if(openCluster===c.id)clearCrossClusterHover();
  });
  circle.addEventListener('click',e=>{e.stopPropagation();showPanel(paper);});
  pnodes[paper.id]={g,circle,r:pR,bfo,bso,c,paper,labelEl,lineEl};
}

function buildDepLines(){
  EDGES.forEach(([a,b])=>{
    const line=mk('line',{x1:CX,y1:CY,x2:CX,y2:CY,
      stroke:'#ffffff','stroke-opacity':0,'stroke-width':1.8});
    line.style.transition='stroke-opacity 0.28s ease';
    depLinesG.appendChild(line);depLineMap[a+'-'+b]=line;
  });
}
function updateDepLinePositions(){
  EDGES.forEach(([a,b])=>{
    const line=depLineMap[a+'-'+b];if(!line)return;
    const na=pnodes[a],nb=pnodes[b];
    line.setAttribute('x1',na?na.paper.bx:CX);line.setAttribute('y1',na?na.paper.by:CY);
    line.setAttribute('x2',nb?nb.paper.bx:CX);line.setAttribute('y2',nb?nb.paper.by:CY);
  });
}

// ═══════════════════════════════════════════════════════════
// CROSS-CLUSTER HOVER (focused cluster mode)
// ═══════════════════════════════════════════════════════════
function setCrossClusterHover(id){
  clearCrossClusterHover();
  const up1=new Set(DEPS[id]?.up||[]);
  const dn1=new Set(DEPS[id]?.down||[]);
  Object.values(pnodes).forEach(n=>{
    const nid=n.paper.id;
    if(n.paper.cluster===openCluster)return;
    if(up1.has(nid)){
      n.circle.setAttribute('r',n.r*1.3);
      setC(n,0.55,1.0,'#2a8a58');
      crossHighlighted.push(nid);
    } else if(dn1.has(nid)){
      n.circle.setAttribute('r',n.r*1.3);
      setC(n,0.55,1.0,'#b84040');
      crossHighlighted.push(nid);
    }
  });
}
function clearCrossClusterHover(){
  crossHighlighted.forEach(nid=>{
    const n=pnodes[nid];if(!n)return;
    n.circle.setAttribute('r',n.r);
    setC(n,n.bfo,n.bso,n.c.color);
    if(n.labelEl) n.labelEl.style.opacity='0';
    if(n.lineEl)  n.lineEl.style.opacity='0';
  });
  crossHighlighted.length=0;
  placedBoxes.length=0;
}

// ═══════════════════════════════════════════════════════════
// DEP HOVER (full view)
// ═══════════════════════════════════════════════════════════
function setDepHover(id){
  if(hoverPaper===id)return;hoverPaper=id;
  const up1=new Set(DEPS[id]?.up||[]);
  const dn1=new Set(DEPS[id]?.down||[]);
  const up2=new Set(),dn2=new Set();
  up1.forEach(u=>(DEPS[u]?.up||[]).forEach(x=>{if(x!==id&&!up1.has(x))up2.add(x);}));
  dn1.forEach(d=>(DEPS[d]?.down||[]).forEach(x=>{if(x!==id&&!dn1.has(x))dn2.add(x);}));
  Object.values(pnodes).forEach(n=>{
    const nid=n.paper.id;
    if(nid===id){
      setC(n,0.40,1.0,'#9a7a00');
      // hovered node uses shared label (already placed by mouseover)
    } else if(up1.has(nid)){
      setC(n,0.35,0.95,'#2a8a58');
      placePaperLabel(nid,'#2a8a58');
    } else if(dn1.has(nid)){
      setC(n,0.35,0.95,'#b84040');
      placePaperLabel(nid,'#b84040');
    } else if(up2.has(nid)||dn2.has(nid)){
      setC(n,0.20,0.55,'#3a5a9a');
    } else {
      setC(n,0.04,0.10,n.c.color);
    }
  });
  Object.entries(depLineMap).forEach(([key,line])=>{
    const[a,b]=key.split('-');
    if(a===id||b===id){line.setAttribute('stroke',b===id?'#2a8a58':'#b84040');line.setAttribute('stroke-opacity',0.70);}
    else line.setAttribute('stroke-opacity',0);
  });
}
function clearDepHover(){
  if(!hoverPaper)return;hoverPaper=null;
  Object.values(pnodes).forEach(n=>{setC(n,panelPaper===n.paper.id?0.28:n.bfo,n.bso,n.c.color);});
  Object.values(depLineMap).forEach(l=>l.setAttribute('stroke-opacity',0));
  hideLabel();hideAllPaperLabels();
}

// ═══════════════════════════════════════════════════════════
// CLUSTER FOCUS
// ═══════════════════════════════════════════════════════════
function toggleCluster(id){
  if(openCluster===id){dismissCluster();}
  else{if(openCluster)dismissCluster(()=>focusCluster(id));else focusCluster(id);}
  if(panelPaper)closePanel();
}
function focusCluster(id){
  openCluster=id;
  const c=cmap[id];
  showClusterInfo(c);
  bloomCluster(id);
  fadeOverlay.setAttribute('opacity',0.62);
  const targetZ=Math.min(2.0,Math.min(W,H)/(RC*0.9));
  animateTo(targetZ,W/2-c.x*targetZ,H/2-c.y*targetZ,560);
  c._ring.setAttribute('fill-opacity',0.30);c._ring.setAttribute('r',14.5*S);
  CLUSTERS_DEF.forEach(other=>{other._g.style.opacity=other.id===id?'1':'0.20';});
  setHint('Hover papers to see cross-cluster connections');
}
function dismissCluster(callback){
  const prev=openCluster;
  if(prev)collapseCluster(prev);
  clearCrossClusterHover();hideLabel();
  openCluster=null;
  hideClusterInfo();
  fadeOverlay.setAttribute('opacity',0);
  animateTo(1,0,0,520,callback);
  CLUSTERS_DEF.forEach(c=>c._g.style.opacity='1');
  setHint('Select a cluster to explore · Full View for all');
}

function bloomCluster(id,delay0=0){
  const c=cmap[id];
  c._ring.setAttribute('fill-opacity',0.30);c._ring.setAttribute('r',14.5*S);
  PAPERS.filter(p=>p.cluster===id).forEach((paper,i)=>{
    const node=pnodes[paper.id];if(!node)return;
    setTimeout(()=>{
      node.g.style.transition='transform 0.52s cubic-bezier(0.34,1.38,0.64,1),opacity 0.36s';
      node.g.style.transform=`translate(${paper.bx}px,${paper.by}px)`;
      node.g.style.opacity='1';
      setTimeout(()=>{if(paper._line)paper._line.setAttribute('stroke-opacity',0.28);},150);
    },delay0+i*46);
  });
}
function collapseCluster(id,instant=false){
  const c=cmap[id];
  c._ring.setAttribute('fill-opacity',0.12);c._ring.setAttribute('r',11.5*S);
  PAPERS.filter(p=>p.cluster===id).forEach((paper,i)=>{
    const node=pnodes[paper.id];if(!node)return;
    if(paper._line)paper._line.setAttribute('stroke-opacity',0);
    const run=()=>{
      node.g.style.transition=instant?'transform 0.16s ease,opacity 0.12s':'transform 0.28s cubic-bezier(0.55,0,1,0.8),opacity 0.20s';
      node.g.style.transform=`translate(${c.x}px,${c.y}px)`;
      node.g.style.opacity='0';
    };
    instant?run():setTimeout(run,i*18);
  });
}

// ═══════════════════════════════════════════════════════════
// FULL VIEW
// ═══════════════════════════════════════════════════════════
const fvBtn=document.getElementById('fv-btn');
fvBtn.addEventListener('click',e=>{e.stopPropagation();fullView?exitFullView():enterFullView();});
function enterFullView(){
  fullView=true;fvBtn.textContent='Exit Full View';fvBtn.classList.add('active');
  document.getElementById('dep-legend').classList.add('vis');
  if(openCluster)dismissCluster();
  fadeOverlay.setAttribute('opacity',0);
  CLUSTERS_DEF.forEach(c=>{c._g.style.opacity='1';c._ring.setAttribute('r',11.5*S);c._ring.setAttribute('fill-opacity',0.12);});
  setHint('Hover a paper to see its name & dependencies');
  const inC=CLUSTERS_DEF.filter(c=>c.bloom==='in');
  const outC=CLUSTERS_DEF.filter(c=>c.bloom==='out');
  inC.forEach((c,i)=>bloomCluster(c.id,i*80));
  const inMax=inC.length?PAPERS.filter(p=>p.cluster===inC[inC.length-1].id).length*46+260:100;
  outC.forEach((c,i)=>bloomCluster(c.id,inMax+i*80));
  setTimeout(updateDepLinePositions,inMax+680);
  if(zoom!==1||panX!==0||panY!==0)animateTo(1,0,0,480);
}
function exitFullView(){
  fullView=false;fvBtn.textContent='Full View';fvBtn.classList.remove('active');
  document.getElementById('dep-legend').classList.remove('vis');
  clearDepHover();hideLabel();hideAllPaperLabels();
  CLUSTERS_DEF.forEach(c=>collapseCluster(c.id,false));
  setHint('Select a cluster to explore · Full View for all');
  if(panelPaper)closePanel();
}

// ═══════════════════════════════════════════════════════════
// PANEL
// ═══════════════════════════════════════════════════════════
function showPanel(paper){
  const c=cmap[paper.cluster]||{},color=c.color||'#888';
  const clName=paper.cluster.startsWith('_')?(cmap[paper.cluster]?.label||'Foundation'):paper.cluster;
  document.querySelector('.p-num').textContent='Paper '+paper.num;
  document.querySelector('.p-title').textContent=paper.title;
  const tag=document.querySelector('.p-tag');
  tag.textContent=clName;tag.style.color=color;tag.style.borderColor=color+'44';tag.style.background=color+'10';
  const st=document.querySelector('.p-status');
  st.textContent=paper.status==='locked'?'● Locked — publication ready':'◌ Active development';
  st.className='p-status '+paper.status;
  document.querySelector('.p-tier').textContent='Tier: '+(['Foundational','Mid-tier','Application'][paper.depth]||'');
  document.querySelector('.p-note').textContent=paper.note||'';
  const upIds=DEPS[paper.id]?.up||[],dnIds=DEPS[paper.id]?.down||[];
  const lines=[];
  if(upIds.length)lines.push('Depends on: '+upIds.map(id=>{const p=PAPERS.find(x=>x.id===id);return p?p.num:id;}).join(', '));
  if(dnIds.length)lines.push('Used by: '+dnIds.map(id=>{const p=PAPERS.find(x=>x.id===id);return p?p.num:id;}).join(', '));
  document.querySelector('.p-deps').textContent=lines.join('\n');
  // Extended panel data
  const pd=PAPER_DATA[paper.id]||null;
  const hasPd=pd&&(pd.synopsis||pd.connections||pd.role);
  document.querySelector('.p-div-syn').style.display=hasPd?'':'none';
  document.querySelector('.p-sh-syn').style.display=hasPd&&pd.synopsis?'':'none';
  document.querySelector('.p-synopsis').textContent=hasPd&&pd.synopsis?pd.synopsis:'';
  document.querySelector('.p-sh-conn').style.display=hasPd&&pd.connections?'':'none';
  document.querySelector('.p-connections').textContent=hasPd&&pd.connections?pd.connections:'';
  document.querySelector('.p-sh-role').style.display=hasPd&&pd.role?'':'none';
  document.querySelector('.p-role').textContent=hasPd&&pd.role?pd.role:'';

  const _paperLink=(paper.url && !/^https?:\/\/informationontology\.org\/?$/.test(paper.url)) ? paper.url : '/papers';
  document.querySelector('.p-link').href=_paperLink;
  panelEl.classList.add('open');
  if(panelPaper&&pnodes[panelPaper]){const prev=pnodes[panelPaper];setC(prev,prev.bfo,prev.bso,prev.c.color);}
  panelPaper=paper.id;
  if(pnodes[paper.id])setC(pnodes[paper.id],0.35,0.95,'#9a7a00');
}
function closePanel(){
  panelEl.classList.remove('open');
  if(panelPaper&&pnodes[panelPaper]){const n=pnodes[panelPaper];setC(n,n.bfo,n.bso,n.c.color);}
  panelPaper=null;
}
document.querySelector('.pc').addEventListener('click',e=>{e.stopPropagation();closePanel();});

// ═══════════════════════════════════════════════════════════
// ZOOM / PAN
// ═══════════════════════════════════════════════════════════
svgEl.addEventListener('wheel',e=>{
  e.preventDefault();if(animating)return;
  const f=e.deltaY<0?1.12:0.89,mx=e.clientX,my=e.clientY,pz=zoom;
  zoom=Math.max(0.22,Math.min(6,zoom*f));
  panX-=(mx-panX)*((zoom-pz)/pz);panY-=(my-panY)*((zoom-pz)/pz);applyT();
},{passive:false});
svgEl.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  isPanning=true;hasDragged=false;
  dragO={x:e.clientX-panX,y:e.clientY-panY};svgEl.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!isPanning)return;
  if(Math.abs(e.clientX-(dragO.x+panX))>3||Math.abs(e.clientY-(dragO.y+panY))>3)hasDragged=true;
  panX=e.clientX-dragO.x;panY=e.clientY-dragO.y;applyT();
});
window.addEventListener('mouseup',()=>{isPanning=false;svgEl.style.cursor='';});
svgEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>touchState[t.identifier]={x:t.clientX,y:t.clientY});
  const ta=Object.values(touchState);
  if(ta.length===1){hasDragged=false;dragO={x:ta[0].x-panX,y:ta[0].y-panY};}
  else if(ta.length===2)lastPinchDist=Math.hypot(ta[1].x-ta[0].x,ta[1].y-ta[0].y);
},{passive:false});
svgEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>touchState[t.identifier]={x:t.clientX,y:t.clientY});
  const ta=Object.values(touchState);
  if(ta.length===1){hasDragged=true;panX=ta[0].x-dragO.x;panY=ta[0].y-dragO.y;applyT();}
  else if(ta.length===2&&lastPinchDist){
    const nd=Math.hypot(ta[1].x-ta[0].x,ta[1].y-ta[0].y);
    const cx=(ta[0].x+ta[1].x)/2,cy=(ta[0].y+ta[1].y)/2,pz=zoom;
    zoom=Math.max(0.2,Math.min(6,zoom*(nd/lastPinchDist)));
    panX=cx-(cx-panX)*(zoom/pz);panY=cy-(cy-panY)*(zoom/pz);applyT();
    lastPinchDist=nd;
  }
},{passive:false});
svgEl.addEventListener('touchend',e=>{
  const changed=Array.from(e.changedTouches);
  changed.forEach(t=>delete touchState[t.identifier]);
  if(Object.keys(touchState).length<2)lastPinchDist=null;
  // Tap detection: single touch, no drag → treat as click on whatever was tapped
  if(!hasDragged&&changed.length===1&&Object.keys(touchState).length===0){
    const t=changed[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el){
      let found=false;
      for(const [id,n] of Object.entries(pnodes)){
        if(n.circle===el||n.g.contains(el)){
          e.preventDefault();
          showPanel(n.paper);
          found=true;break;
        }
      }
      if(!found){
        for(const c of CLUSTERS_DEF){
          if(c._g&&c._g.contains(el)){
            e.preventDefault();
            if(!fullView)toggleCluster(c.id);
            found=true;break;
          }
        }
      }
      if(!found){
        if(!fullView&&openCluster){dismissCluster();}
        else{closePanel();}
      }
    }
  }
});
svgEl.addEventListener('click',()=>{
  if(hasDragged)return;
  if(!fullView&&openCluster){dismissCluster();return;}
  closePanel();
});
svgEl.addEventListener('dblclick',e=>{e.stopPropagation();animateTo(1,0,0,420);});

// ═══════════════════════════════════════════════════════════
// LEGEND + MISC
// ═══════════════════════════════════════════════════════════
function buildLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  CLUSTERS_DEF.forEach(c=>{
    const d=document.createElement('div');d.className='lg';
    d.innerHTML=`<div class="lg-dot" style="background:${c.color}"></div>${c.label||c.id}`;
    el.appendChild(d);
  });
}
function setHint(t){const h=document.getElementById('hint');h.textContent=t;h.style.opacity=t?'1':'0';}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
function init(){
  Object.keys(pnodes).forEach(k=>delete pnodes[k]);
  Object.keys(cmap).forEach(k=>delete cmap[k]);
  Object.keys(depLineMap).forEach(k=>delete depLineMap[k]);
  PAPERS.forEach(p=>{delete p._line;delete p._labelEl;delete p.bx;delete p.by;});
  CLUSTERS_DEF.forEach(c=>{delete c._g;delete c._ring;});
  openCluster=null;fullView=false;hoverPaper=null;panelPaper=null;
  zoom=1;panX=0;panY=0;animating=false;sharedLabel=null;sharedLine=null;
  computePositions();buildSVG();
  fvBtn.textContent='Full View';fvBtn.classList.remove('active');
  document.getElementById('dep-legend').classList.remove('vis');
}
init();
window.addEventListener('resize',()=>{
  clearTimeout(window._rt);
  window._rt=setTimeout(()=>{panelEl.classList.remove('open');init();},220);
});
</script>
</body>
</html>
